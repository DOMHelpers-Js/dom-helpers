    <script>
      const count = ref(1);
const message = ref('Hello');

console.log(count.value);   // 0
console.log(message.value); // "Hello"

// Use in expressions
const doubled = count.value * 2;
const greeting = message.value + ', World!';  

console.log(doubled);  // 2
console.log(greeting); // "Hello, World!"
    </script>
