<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOM Helpers — Basic SPA Demo</title>
  <style>
    /* ── Reset & base ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8f9fa;
      color: #212529;
      min-height: 100vh;
    }

    /* ── Layout ──────────────────────────────────────────── */
    .shell {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* ── App header ──────────────────────────────────────── */
    .app-header {
      background: #fff;
      border-bottom: 1px solid #dee2e6;
      padding: 0 1.5rem;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }

    .app-header-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
    }

    .logo {
      font-weight: 700;
      font-size: 1.1rem;
      color: #4f46e5;
      text-decoration: none;
      white-space: nowrap;
    }

    /* ── Navigation ──────────────────────────────────────── */
    nav {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
    }

    nav [data-route] {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.85rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      color: #495057;
      cursor: pointer;
      text-decoration: none;
      border: none;
      background: transparent;
      transition: background 0.15s, color 0.15s;
    }

    nav [data-route]:hover {
      background: #f1f3f5;
      color: #212529;
    }

    nav [data-route].active {
      background: #ede9fe;
      color: #4f46e5;
    }

    /* ── Outlet ──────────────────────────────────────────── */
    #app {
      min-height: calc(100vh - 56px - 4rem);
    }

    /* ── Page views ──────────────────────────────────────── */
    .page {
      padding: 2.5rem 0;
      animation: pageIn 0.22s ease both;
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .page h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }

    .page h2 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }

    .page .lead {
      font-size: 1.1rem;
      color: #6c757d;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    /* ── Cards ───────────────────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .card {
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 10px;
      padding: 1.25rem;
      cursor: pointer;
      transition: box-shadow 0.18s, border-color 0.18s, transform 0.18s;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(79,70,229,0.12);
      border-color: #a5b4fc;
      transform: translateY(-2px);
    }

    .card .card-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .card .card-name { font-weight: 600; font-size: 1rem; color: #212529; }
    .card .card-tag  { font-size: 0.8rem; color: #868e96; margin-top: 0.25rem; }

    /* ── Profile page ────────────────────────────────────── */
    .profile-card {
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 12px;
      padding: 2rem;
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
      max-width: 480px;
    }

    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
    }

    .profile-details h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.25rem; }
    .profile-details p  { color: #6c757d; font-size: 0.9rem; margin-bottom: 0.125rem; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-top: 0.5rem;
    }
    .badge-indigo { background: #ede9fe; color: #4f46e5; }
    .badge-green  { background: #d1fae5; color: #065f46; }
    .badge-amber  { background: #fef3c7; color: #92400e; }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.1rem;
      border-radius: 7px;
      font-size: 0.875rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-ghost   { background: transparent; color: #4f46e5; border: 1.5px solid #a5b4fc; }
    .btn-ghost:hover { background: #ede9fe; }

    /* ── Route info strip ────────────────────────────────── */
    .route-strip {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30,30,30,.88);
      color: #e2e8f0;
      font-size: 0.78rem;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      backdrop-filter: blur(6px);
      pointer-events: none;
      font-family: monospace;
      white-space: nowrap;
    }

    /* ── 404 ─────────────────────────────────────────────── */
    .not-found {
      text-align: center;
      padding: 4rem 2rem;
    }

    .not-found .code {
      font-size: 5rem;
      font-weight: 800;
      color: #dee2e6;
      line-height: 1;
    }

    .not-found h2 {
      font-size: 1.5rem;
      color: #495057;
      margin: 0.75rem 0 1.5rem;
    }
  </style>
</head>
<body>

  <!-- ── App Shell ─────────────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="app-header-inner">
      <a class="logo" data-route="/">⬡ MyApp</a>
      <nav>
        <a data-route="/"        data-route-active-class="active" data-route-exact>🏠 Home</a>
        <a data-route="/team"    data-route-active-class="active">👥 Team</a>
        <a data-route="/about"   data-route-active-class="active">ℹ️ About</a>
        <a data-route="/contact" data-route-active-class="active">✉️ Contact</a>
      </nav>
    </div>
  </header>

  <!-- ── Router outlet ─────────────────────────────────────────────────────── -->
  <main class="shell">
    <div id="app"></div>
  </main>

  <!-- ── Route info HUD ────────────────────────────────────────────────────── -->
  <div class="route-strip" id="routeHud">Route: /</div>

  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!--  VIEWS  — native <template> tags (not rendered until the router mounts) -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->

  <!-- HOME ──────────────────────────────────────────────────────────────── -->
  <template id="view-home">
    <div class="page">
      <h1>Welcome to MyApp 👋</h1>
      <p class="lead">
        This is a Single Page Application built with DOM Helpers.<br>
        Click the nav links above or the cards below to navigate.
      </p>

      <div class="card-grid">
        <div class="card" data-route="/team">
          <div class="card-icon">👥</div>
          <div class="card-name">Our Team</div>
          <div class="card-tag">Meet the people</div>
        </div>
        <div class="card" data-route="/about">
          <div class="card-icon">📖</div>
          <div class="card-name">About</div>
          <div class="card-tag">Who we are</div>
        </div>
        <div class="card" data-route="/contact">
          <div class="card-icon">✉️</div>
          <div class="card-name">Contact</div>
          <div class="card-tag">Get in touch</div>
        </div>
        <div class="card" data-route="/user/42">
          <div class="card-icon">🧑‍💻</div>
          <div class="card-name">User Profile</div>
          <div class="card-tag">Dynamic route: /user/:id</div>
        </div>
      </div>
    </div>
  </template>

  <!-- TEAM ──────────────────────────────────────────────────────────────── -->
  <template id="view-team">
    <div class="page">
      <h1>Our Team</h1>
      <p class="lead">Click a member card to view their profile page (dynamic route).</p>

      <div class="card-grid">
        <div class="card" data-route="/user/1">
          <div class="profile-avatar" style="width:48px;height:48px;font-size:1.2rem;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:inline-flex;align-items:center;justify-content:center;margin-bottom:.5rem">👩</div>
          <div class="card-name">Alice Martin</div>
          <div class="card-tag">Lead Designer · /user/1</div>
        </div>
        <div class="card" data-route="/user/2">
          <div class="profile-avatar" style="width:48px;height:48px;font-size:1.2rem;border-radius:50%;background:linear-gradient(135deg,#f093fb,#f5576c);display:inline-flex;align-items:center;justify-content:center;margin-bottom:.5rem">👨</div>
          <div class="card-name">Bob Chen</div>
          <div class="card-tag">Senior Engineer · /user/2</div>
        </div>
        <div class="card" data-route="/user/3">
          <div class="profile-avatar" style="width:48px;height:48px;font-size:1.2rem;border-radius:50%;background:linear-gradient(135deg,#4facfe,#00f2fe);display:inline-flex;align-items:center;justify-content:center;margin-bottom:.5rem">🧕</div>
          <div class="card-name">Sara López</div>
          <div class="card-tag">Product Manager · /user/3</div>
        </div>
      </div>
    </div>
  </template>

  <!-- USER PROFILE (dynamic :id route) ──────────────────────────────────── -->
  <template id="view-user">
    <div class="page">
      <div style="margin-bottom:1rem">
        <a class="btn btn-ghost" data-route="/team">← Back to Team</a>
      </div>
      <h2>User Profile</h2>
      <div class="profile-card" style="margin-top:1rem">
        <div class="profile-avatar" id="userAvatar">👤</div>
        <div class="profile-details">
          <h3 id="userName">Loading…</h3>
          <p id="userRole">—</p>
          <p id="userEmail">—</p>
          <span class="badge badge-indigo" id="userBadge">#?</span>
        </div>
      </div>
    </div>
  </template>

  <!-- ABOUT ─────────────────────────────────────────────────────────────── -->
  <template id="view-about">
    <div class="page">
      <h1>About MyApp</h1>
      <p class="lead">
        MyApp is a demonstration Single Page Application built entirely with
        <strong>DOM Helpers JS</strong> — a lightweight, zero-dependency vanilla
        JavaScript library.
      </p>
      <ul style="line-height:2;color:#495057;padding-left:1.25rem">
        <li>Zero dependencies — pure vanilla JS</li>
        <li>Hash-mode routing (works on any static host)</li>
        <li>Declarative navigation with <code>[data-route]</code></li>
        <li>Lifecycle hooks: <code>onEnter</code> / <code>onLeave</code></li>
        <li>Navigation guards: <code>beforeEach</code> / <code>afterEach</code></li>
        <li>CSS view transitions built-in</li>
      </ul>
      <div style="margin-top:1.5rem;display:flex;gap:.75rem;flex-wrap:wrap">
        <a class="btn btn-primary" data-route="/">Go Home</a>
        <a class="btn btn-ghost"   data-route="/contact">Contact Us</a>
      </div>
    </div>
  </template>

  <!-- CONTACT ───────────────────────────────────────────────────────────── -->
  <template id="view-contact">
    <div class="page">
      <h1>Contact</h1>
      <p class="lead">Reach out — we'd love to hear from you.</p>
      <form id="contactForm" style="max-width:420px;display:flex;flex-direction:column;gap:1rem">
        <div>
          <label style="display:block;font-size:.875rem;font-weight:500;margin-bottom:.35rem">Name</label>
          <input id="contactName" type="text" placeholder="Your name"
            style="width:100%;padding:.55rem .75rem;border:1.5px solid #dee2e6;border-radius:7px;font-size:.9rem;outline:none;transition:border-color .15s"
            onfocus="this.style.borderColor='#a5b4fc'" onblur="this.style.borderColor='#dee2e6'" />
        </div>
        <div>
          <label style="display:block;font-size:.875rem;font-weight:500;margin-bottom:.35rem">Message</label>
          <textarea id="contactMessage" rows="4" placeholder="Your message…"
            style="width:100%;padding:.55rem .75rem;border:1.5px solid #dee2e6;border-radius:7px;font-size:.9rem;resize:vertical;outline:none;transition:border-color .15s"
            onfocus="this.style.borderColor='#a5b4fc'" onblur="this.style.borderColor='#dee2e6'"></textarea>
        </div>
        <button class="btn btn-primary" type="submit" style="align-self:flex-start">Send Message ✉️</button>
        <p id="contactFeedback" style="color:#065f46;font-size:.875rem;display:none"></p>
      </form>
    </div>
  </template>

  <!-- 404 ───────────────────────────────────────────────────────────────── -->
  <template id="view-404">
    <div class="page not-found">
      <div class="code">404</div>
      <h2>Page Not Found</h2>
      <p style="color:#6c757d;margin-bottom:1.5rem">
        The route <code id="notFoundPath"></code> doesn't exist.
      </p>
      <a class="btn btn-primary" data-route="/">← Go Home</a>
    </div>
  </template>


  <!-- ═══════════════════════════════════════════════════════════════════════ -->
  <!--  SCRIPTS                                                                -->
  <!-- ═══════════════════════════════════════════════════════════════════════ -->

  <!--
    Load order:
      1. DOM Helpers full bundle  (Elements, Collections, ReactiveUtils, …)
      2. DOM Helpers SPA module   (Router)

    For projects that only need the Router (no DOM Helpers):
      <script src="dom-helpers.spa.min.js"></script>
  -->
 <script src="https://cdn.jsdelivr.net/npm/dom-helpers-js@2.8.0/dist/dom-helpers.spa.min.js"></script>


  <script>
    // ── Fake user data (replaces a real API call) ─────────────────────────
    const USERS = {
      '1': { name: 'Alice Martin',  role: 'Lead Designer',    email: 'alice@myapp.io',  avatar: '👩', badge: 'badge-indigo' },
      '2': { name: 'Bob Chen',      role: 'Senior Engineer',  email: 'bob@myapp.io',    avatar: '👨', badge: 'badge-green'  },
      '3': { name: 'Sara López',    role: 'Product Manager',  email: 'sara@myapp.io',   avatar: '🧕', badge: 'badge-amber'  },
    };

    // ── Route definitions ─────────────────────────────────────────────────
    Router.define([
      {
        path  : '/',
        view  : '#view-home',
        title : 'Home — MyApp',
      },
      {
        path  : '/team',
        view  : '#view-team',
        title : 'Team — MyApp',
      },
      {
        path  : '/user/:id',
        view  : '#view-user',
        title : 'Profile — MyApp',

        onEnter(params, query, onCleanup) {
          const user = USERS[params.id];

          if (user) {
            // Use DOM Helpers to update the profile card
            Elements.userName.update({ textContent: user.name });
            Elements.userRole.update({ textContent: user.role });
            Elements.userEmail.update({ textContent: user.email });
            Elements.userAvatar.update({ textContent: user.avatar });
            Elements.userBadge.update({
              textContent : 'ID #' + params.id,
              className   : 'badge ' + user.badge,
            });
            document.title = user.name + ' — MyApp';
          } else {
            // Unknown user ID — navigate to 404
            Router.go('*');
          }
        },
      },
      {
        path  : '/about',
        view  : '#view-about',
        title : 'About — MyApp',
      },
      {
        path  : '/contact',
        view  : '#view-contact',
        title : 'Contact — MyApp',

        onEnter(params, query, onCleanup) {
          const form     = document.getElementById('contactForm');
          const feedback = document.getElementById('contactFeedback');

          function handleSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('contactName').value.trim();
            const msg  = document.getElementById('contactMessage').value.trim();

            if (!name || !msg) {
              feedback.textContent = '⚠️ Please fill in both fields.';
              feedback.style.color = '#92400e';
              feedback.style.display = 'block';
              return;
            }

            feedback.textContent = '✅ Message sent! Thanks, ' + name + '.';
            feedback.style.color = '#065f46';
            feedback.style.display = 'block';
            form.reset();
          }

          form.addEventListener('submit', handleSubmit);

          // Colocated cleanup: remove listener when the view unmounts
          onCleanup(() => form.removeEventListener('submit', handleSubmit));
        },
      },
      {
        path  : '*',
        view  : '#view-404',
        title : '404 — MyApp',

        onEnter(params) {
          const el = document.getElementById('notFoundPath');
          if (el) el.textContent = Router.current() ? Router.current().path : window.location.hash;
        },
      },
    ]);

    // ── Navigation hooks ──────────────────────────────────────────────────

    // Update the route HUD on every navigation
    Router.afterEach(function (to) {
      const hud = document.getElementById('routeHud');
      if (hud) hud.textContent = 'Route: ' + to.path +
        (Object.keys(to.params).length ? '  |  params: ' + JSON.stringify(to.params) : '');
    });

    // 404 event
    Router.on('notfound', function (info) {
      console.warn('[Router] No route matched for:', info.path);
    });

    // ── Mount & start ─────────────────────────────────────────────────────
    Router.mount('#app');
    Router.start({ mode: 'hash', scrollToTop: true });
  </script>

</body>
</html>
