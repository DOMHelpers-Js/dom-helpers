<!DOCTYPE html>
<html>
<head><title>Test updateAll() - Global vs Method</title></head>
<body>
  <div id="output1">0</div>
  <div id="output2">0</div>
  
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script>
    const state = ReactiveUtils.state({
      value1: 0,
      value2: 0
    });
    
    console.log('updateAll is available as:');
    console.log('  1. Global function: updateAll(state, updates)');
    console.log('  2. State method: state.$update(updates)');
    console.log('  3. ReactiveUtils method: ReactiveUtils.updateAll(state, updates)');
    
    // Test 1: Global function
    console.log('\n=== Test 1: Global function ===');
    updateAll(state, {
      value1: 10,
      value2: 20,
      '#output1': { textContent: '10' }
    });
    console.log('State:', { value1: state.value1, value2: state.value2 });
    
    // Test 2: State method
    setTimeout(() => {
      console.log('\n=== Test 2: State method ===');
      state.$update({
        value1: 30,
        value2: 40,
        '#output2': { textContent: '40' }
      });
      console.log('State:', { value1: state.value1, value2: state.value2 });
    }, 1000);
    
    // Test 3: ReactiveUtils method
    setTimeout(() => {
      console.log('\n=== Test 3: ReactiveUtils method ===');
      ReactiveUtils.updateAll(state, {
        value1: 50,
        value2: 60,
        '#output1': { textContent: '50' },
        '#output2': { textContent: '60' }
      });
      console.log('State:', { value1: state.value1, value2: state.value2 });
    }, 2000);
    
    console.log('\nAll three methods do the same thing!');
  </script>
</body>
</html>
