<!DOCTYPE html>
<html>
<head><title>Test collection.shift()</title></head>
<body>
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script src="../../src/Reactive/02_dh-reactive-array-patch.js"></script>
  <script src="../../src/Reactive/03_dh-reactive-collections.js"></script>
  <script>
    console.log('=== Testing collection.shift() ===');
    
    // Basic shift
    console.log('\n=== Basic shift ===');
    const collection = ReactiveUtils.collection([1, 2, 3, 4, 5]);
    console.log('Before shift:', collection.items);
    
    const shifted1 = collection.shift();
    console.log('shift() returned:', shifted1);
    console.log('After shift():', collection.items);
    
    const shifted2 = collection.shift();
    console.log('shift() returned:', shifted2);
    console.log('After shift():', collection.items);
    
    // Shift updates length
    console.log('\n=== Shift updates length ===');
    const lengthTest = ReactiveUtils.collection([1, 2, 3]);
    console.log('Before shift, length:', lengthTest.length);
    lengthTest.shift();
    console.log('After shift, length:', lengthTest.length);
    
    // Shift updates first
    console.log('\n=== Shift updates first ===');
    const firstTest = ReactiveUtils.collection([1, 2, 3]);
    console.log('Before shift, first:', firstTest.first);
    firstTest.shift();
    console.log('After shift, first:', firstTest.first);
    
    // Shift on empty
    console.log('\n=== Shift on empty ===');
    const empty = ReactiveUtils.collection();
    const result = empty.shift();
    console.log('shift() on empty returned:', result);
    console.log('Items:', empty.items);
    console.log('✓ Returns undefined on empty collection');
    
    // Shift until empty
    console.log('\n=== Shift until empty ===');
    const until = ReactiveUtils.collection([1, 2, 3]);
    console.log('Initial:', until.items);
    
    while (until.length > 0) {
      const val = until.shift();
      console.log('Shifted:', val, '- Remaining:', until.items);
    }
    
    console.log('Final state:');
    console.log('  items:', until.items);
    console.log('  length:', until.length);
    console.log('  first:', until.first);
    console.log('  last:', until.last);
    
    // With objects
    console.log('\n=== With objects ===');
    const todos = ReactiveUtils.collection([
      { id: 1, text: 'Task 1' },
      { id: 2, text: 'Task 2' },
      { id: 3, text: 'Task 3' }
    ]);
    console.log('Before shift:', todos.items);
    
    const shiftedTask = todos.shift();
    console.log('Shifted task:', shiftedTask);
    console.log('After shift:', todos.items);
    
    // Single item
    console.log('\n=== Single item ===');
    const single = ReactiveUtils.collection([42]);
    console.log('Before shift:', single.items);
    console.log('first:', single.first, 'last:', single.last);
    
    const val = single.shift();
    console.log('Shifted:', val);
    console.log('After shift:', single.items);
    console.log('first:', single.first, 'last:', single.last);
    
    // Comparison with pop
    console.log('\n=== Comparison: shift vs pop ===');
    const forShift = ReactiveUtils.collection([1, 2, 3, 4, 5]);
    const forPop = ReactiveUtils.collection([1, 2, 3, 4, 5]);
    
    console.log('shift() removes from start:', forShift.shift(), '→', forShift.items);
    console.log('pop() removes from end:', forPop.pop(), '→', forPop.items);
    
    // Test reactivity
    console.log('\n=== Testing reactivity ===');
    const reactive = ReactiveUtils.collection([1, 2, 3, 4, 5]);
    let effectRuns = 0;
    
    ReactiveUtils.effect(() => {
      effectRuns++;
      console.log(`Effect #${effectRuns}: [${reactive.items.join(', ')}] (length: ${reactive.length}, first: ${reactive.first})`);
    });
    
    setTimeout(() => {
      reactive.shift();
      console.log('Effect runs after shift:', effectRuns);
    }, 500);
    
    setTimeout(() => {
      reactive.shift();
      console.log('Effect runs after second shift:', effectRuns);
    }, 1000);
    
    setTimeout(() => {
      console.log('\n=== Summary ===');
      console.log('✓ shift() removes and returns first item');
      console.log('✓ shift() returns undefined on empty collection');
      console.log('✓ shift() decreases length');
      console.log('✓ shift() updates first property');
      console.log('✓ shift() works with numbers, strings, and objects');
      console.log('✓ shift() is safe to call repeatedly');
      console.log('✓ shift() is reactive and triggers effects');
    }, 1500);
  </script>
</body>
</html>
