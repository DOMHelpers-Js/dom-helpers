<!DOCTYPE html>
<html>
<head><title>Test ReactiveUtils.list()</title></head>
<body>
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script src="../../src/Reactive/02_dh-reactive-array-patch.js"></script>
  <script src="../../src/Reactive/03_dh-reactive-collections.js"></script>
  <script>
    console.log('=== Testing ReactiveUtils.list() ===');
    console.log('Note: This is an alias for ReactiveUtils.collection()');
    
    // Create list
    const list = ReactiveUtils.list(['apple', 'banana', 'cherry']);
    console.log('\nList created:', list.items);
    console.log('length:', list.length);
    
    // Test list methods
    console.log('\n=== Testing list methods ===');
    
    list.add('date');
    console.log('After add("date"):', list.items);
    
    list.remove('banana');
    console.log('After remove("banana"):', list.items);
    
    console.log('first:', list.first);
    console.log('last:', list.last);
    console.log('isEmpty:', list.isEmpty());
    
    // Test array methods
    console.log('\n=== Testing array methods ===');
    
    list.push('elderberry');
    console.log('After push("elderberry"):', list.items);
    
    list.sort();
    console.log('After sort():', list.items);
    
    const filtered = list.filter(fruit => fruit.startsWith('a'));
    console.log('Fruits starting with "a":', filtered);
    
    // Test with numbers
    console.log('\n=== Testing with numbers ===');
    const numbers = ReactiveUtils.list([5, 2, 8, 1, 9]);
    console.log('Numbers list:', numbers.items);
    
    numbers.sort((a, b) => a - b);
    console.log('After sort:', numbers.items);
    
    const doubled = numbers.map(n => n * 2);
    console.log('Doubled:', doubled);
    
    const evens = numbers.filter(n => n % 2 === 0);
    console.log('Even numbers:', evens);
    
    // Test forEach
    console.log('\n=== Testing forEach ===');
    console.log('All numbers:');
    numbers.forEach((num, index) => {
      console.log(`  [${index}] ${num}`);
    });
    
    // Verify alias
    console.log('\n=== Verifying alias ===');
    console.log('ReactiveUtils.list === ReactiveUtils.collection:', 
      ReactiveUtils.list === ReactiveUtils.collection);
    console.log('✓ Both create the same type of collection');
    
    // Test reactivity
    console.log('\n=== Testing reactivity ===');
    let effectRuns = 0;
    ReactiveUtils.effect(() => {
      effectRuns++;
      console.log(`Effect #${effectRuns}: ${numbers.length} numbers - [${numbers.items.join(', ')}]`);
    });
    
    setTimeout(() => {
      numbers.add(10);
      console.log('Effect runs after add:', effectRuns);
    }, 500);
    
    setTimeout(() => {
      numbers.reverse();
      console.log('Effect runs after reverse:', effectRuns);
    }, 1000);
    
    setTimeout(() => {
      console.log('\n=== Summary ===');
      console.log('✓ ReactiveUtils.list() is an alias for collection()');
      console.log('✓ All list methods work correctly');
      console.log('✓ Lists are fully reactive');
    }, 1500);
  </script>
</body>
</html>
