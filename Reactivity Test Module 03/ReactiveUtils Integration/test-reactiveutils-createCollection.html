<!DOCTYPE html>
<html>
<head><title>Test ReactiveUtils.createCollection()</title></head>
<body>
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script src="../../src/Reactive/02_dh-reactive-array-patch.js"></script>
  <script src="../../src/Reactive/03_dh-reactive-collections.js"></script>
  <script>
    console.log('=== Testing ReactiveUtils.createCollection() ===');
    console.log('Note: This is an alias for ReactiveUtils.collection()');
    
    // Create collection
    const collection = ReactiveUtils.createCollection([10, 20, 30, 40, 50]);
    console.log('\nCollection created:', collection.items);
    console.log('length:', collection.length);
    console.log('first:', collection.first);
    console.log('last:', collection.last);
    
    // Test collection methods
    console.log('\n=== Testing collection methods ===');
    
    collection.add(60);
    console.log('After add(60):', collection.items);
    
    collection.remove(30);
    console.log('After remove(30):', collection.items);
    
    collection.update(20, { value: 200 });
    console.log('After update(20, {value: 200}):', collection.items);
    
    // Test array-like methods
    console.log('\n=== Testing array-like methods ===');
    
    const mapped = collection.map(n => n * 2);
    console.log('map(n => n * 2):', mapped);
    
    const filtered = collection.filter(n => n > 30);
    console.log('filter(n => n > 30):', filtered);
    
    const found = collection.find(n => n === 40);
    console.log('find(n => n === 40):', found);
    
    // Test with complex objects
    console.log('\n=== Testing with complex objects ===');
    const products = ReactiveUtils.createCollection([
      { id: 1, name: 'Laptop', price: 999, stock: 5 },
      { id: 2, name: 'Mouse', price: 25, stock: 50 },
      { id: 3, name: 'Keyboard', price: 75, stock: 20 }
    ]);
    
    console.log('Products:', products.items);
    
    products.add({ id: 4, name: 'Monitor', price: 300, stock: 10 });
    console.log('\nAfter adding Monitor:', products.items);
    
    products.update(p => p.id === 2, { stock: 45 });
    console.log('\nAfter updating Mouse stock:', products.items);
    
    const expensive = products.filter(p => p.price > 50);
    console.log('\nExpensive products (>$50):', expensive);
    
    const names = products.map(p => p.name);
    console.log('Product names:', names);
    
    // Test advanced methods
    console.log('\n=== Testing advanced methods ===');
    
    products.push({ id: 5, name: 'Headphones', price: 50, stock: 30 });
    console.log('After push:', products.items);
    
    products.sort((a, b) => a.price - b.price);
    console.log('After sort by price:', products.items);
    
    const cheapest = products.at(0);
    console.log('Cheapest product:', cheapest);
    
    // Verify alias
    console.log('\n=== Verifying alias ===');
    const isSameAsCollection = ReactiveUtils.createCollection === ReactiveUtils.collection;
    const isSameAsList = ReactiveUtils.createCollection === ReactiveUtils.list;
    
    console.log('createCollection === collection:', isSameAsCollection);
    console.log('createCollection === list:', isSameAsList);
    
    if (isSameAsCollection && isSameAsList) {
      console.log('✓ All three are aliases for the same function');
    }
    
    // Test reactivity
    console.log('\n=== Testing reactivity ===');
    let effectRuns = 0;
    ReactiveUtils.effect(() => {
      effectRuns++;
      const total = collection.items.reduce((sum, n) => sum + (n.value || n), 0);
      console.log(`Effect #${effectRuns}: ${collection.length} items, total = ${total}`);
    });
    
    setTimeout(() => {
      collection.add(100);
      console.log('Effect runs after add:', effectRuns);
    }, 500);
    
    setTimeout(() => {
      collection.pop();
      console.log('Effect runs after pop:', effectRuns);
    }, 1000);
    
    setTimeout(() => {
      collection.clear();
      console.log('After clear:', collection.items);
      console.log('Effect runs after clear:', effectRuns);
    }, 1500);
    
    setTimeout(() => {
      console.log('\n=== Summary ===');
      console.log('✓ ReactiveUtils.createCollection() works perfectly');
      console.log('✓ It is an alias for collection() and list()');
      console.log('✓ All collection methods are available');
      console.log('✓ Fully reactive with automatic tracking');
    }, 2000);
  </script>
</body>
</html>
