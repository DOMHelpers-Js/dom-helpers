<!DOCTYPE html>
<html>
<head><title>Test Collections.createWithComputed()</title></head>
<body>
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script src="../../src/Reactive/03_dh-reactive-collections.js"></script>
  <script>
    console.log('=== Testing Collections.createWithComputed() ===');
    
    // Create collection with computed properties
    const cart = Collections.createWithComputed(
      [
        { id: 1, name: 'Laptop', price: 999, quantity: 1 },
        { id: 2, name: 'Mouse', price: 25, quantity: 2 },
        { id: 3, name: 'Keyboard', price: 75, quantity: 1 }
      ],
      {
        // Computed: total items count
        totalItems() {
          return this.items.reduce((sum, item) => sum + item.quantity, 0);
        },
        
        // Computed: subtotal
        subtotal() {
          return this.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        },
        
        // Computed: average price
        averagePrice() {
          if (this.items.length === 0) return 0;
          return this.subtotal / this.totalItems;
        },
        
        // Computed: item names
        itemNames() {
          return this.items.map(item => item.name).join(', ');
        }
      }
    );
    
    console.log('Initial cart:', cart.items);
    console.log('\nComputed properties:');
    console.log('  totalItems:', cart.totalItems);
    console.log('  subtotal: $', cart.subtotal);
    console.log('  averagePrice: $', cart.averagePrice.toFixed(2));
    console.log('  itemNames:', cart.itemNames);
    
    // Test that computed updates when items change
    console.log('\n=== Adding item ===');
    cart.add({ id: 4, name: 'Monitor', price: 300, quantity: 1 });
    
    console.log('After add:');
    console.log('  totalItems:', cart.totalItems);
    console.log('  subtotal: $', cart.subtotal);
    console.log('  averagePrice: $', cart.averagePrice.toFixed(2));
    console.log('  itemNames:', cart.itemNames);
    
    // Update quantity
    console.log('\n=== Updating quantity ===');
    cart.update(item => item.id === 2, { quantity: 5 });
    
    console.log('After updating mouse quantity to 5:');
    console.log('  totalItems:', cart.totalItems);
    console.log('  subtotal: $', cart.subtotal);
    
    // Remove item
    console.log('\n=== Removing item ===');
    cart.remove(item => item.id === 4);
    
    console.log('After removing monitor:');
    console.log('  totalItems:', cart.totalItems);
    console.log('  subtotal: $', cart.subtotal);
    console.log('  itemNames:', cart.itemNames);
    
    // Test reactivity of computed
    console.log('\n=== Testing computed reactivity ===');
    let effectRuns = 0;
    ReactiveUtils.effect(() => {
      effectRuns++;
      console.log(`Effect #${effectRuns}: subtotal = $${cart.subtotal}, items = ${cart.totalItems}`);
    });
    
    setTimeout(() => {
      cart.add({ id: 5, name: 'Headphones', price: 50, quantity: 2 });
      console.log('Effect runs after add:', effectRuns);
    }, 500);
  </script>
</body>
</html>
