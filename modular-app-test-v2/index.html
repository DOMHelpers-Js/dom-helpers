<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOMHelpers — Modular Test v2</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <nav>
    <a href="#/">Home</a>
    <a href="#/about">About</a>
    <a href="#/nowhere">404</a>
  </nav>

  <!-- Router outlet -->
  <div id="app"></div>

  <!-- Route views -->
  <template id="home">
    <div class="home-wrap">
      <h1>Home Page</h1>
      <p>Modular test — reactive counter via store.js</p>
      <div class="counter-box">
        <button class="btn btn-dec" id="btn-dec">−</button>
        <span id="count-display">0</span>
        <button class="btn btn-inc" id="btn-inc">+</button>
      </div>
      <button class="btn-reset" id="btn-reset">Reset</button>
    </div>
  </template>

  <template id="about">
    <div class="about-wrap">
      <h2>About</h2>
      <p>Testing reactive store across routes. Log in below and navigate back to Home — the store state persists.</p>
      <div class="user-card">
        <p>Status: <strong id="login-status">Logged out</strong></p>
        <p>User: <strong id="login-user">—</strong></p>
        <button class="btn-login" id="btn-login">Login as Alice</button>
        <button class="btn-logout" id="btn-logout" style="display:none">Logout</button>
      </div>
    </div>
  </template>

  <template id="404">
    <div class="notfound-wrap">
      <h2>404</h2>
      <p>Page not found.</p>
      <button class="btn-home" id="btn-home">Go Home</button>
    </div>
  </template>

  <!-- 1. Load library first -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/dom-helpers-js@2.9.0/dist/dom-helpers.full-spa.esm.min.js"></script>
  <!-- 2. Then your app -->
  <script type="module" src="./app.js"></script>

</body>
</html>
