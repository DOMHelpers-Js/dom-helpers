<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSave Test</title>
</head>
<body>
    <h1>Counter: <span id="count">0</span></h1>
    <button id="increment">Increment</button>
    <button id="reset">Reset</button>

    <!-- Load scripts in order -->
    <script src="src/Reactive/01_dh-reactive.js"></script>
    <script src="src/Reactive/07_dh-reactiveUtils-shortcut.js"></script>
    <script src="src/Reactive/08_dh-reactive-storage.js"></script>
    
    <script>
        // Create counter with autosave

        // Option 1: One-liner
           //const counter = autoSave(ref(0), 'counter');
        
           
        // Option 2: Create ref and then apply autoSave
         const counter = ref(0);
         autoSave(counter, 'counter');


        console.log('Counter loaded:', counter.value);
        
        // Update UI
        effect(() => {
            document.getElementById('count').textContent = counter.value;
        });
        
        // Increment button
        document.getElementById('increment').onclick = () => {
            counter.value++;
            console.log('Counter:', counter.value, '(auto-saved)');
        };
        
        // Reset button
        document.getElementById('reset').onclick = () => {
            counter.value = 0;
            console.log('Counter reset');
        };
        
        // Try reloading the page - the counter persists! 🎉
    </script>
</body>
</html>
