<!DOCTYPE html>
<html>
<head><title>Test All DOM Binding Methods</title></head>
<body>
  <div id="form-container">
    <input type="text" id="username" name="username" />
    <input type="email" id="email" name="email" />
    <input type="password" id="password" name="password" />
    <input type="checkbox" id="terms" name="terms" />
    
    <div class="form-inputs">
      <input type="text" name="firstName" class="text-input" />
      <input type="text" name="lastName" class="text-input" />
    </div>
  </div>
  
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script src="../../src/Reactive/04_dh-reactive-form.js"></script>
  <script>
    console.log('=== Testing All DOM Binding Methods ===');
    
    // Create comprehensive form
    const form = ReactiveUtils.form({
      username: '',
      email: '',
      password: '',
      terms: false
    }, {
      validators: {
        username: (value) => {
          if (!value) return 'Username required';
          if (value.length < 3) return 'Too short';
          return null;
        },
        email: (value) => {
          if (!value) return 'Email required';
          if (!/\S+@\S+\.\S+/.test(value)) return 'Invalid email';
          return null;
        },
        password: (value) => {
          if (!value) return 'Password required';
          if (value.length < 6) return 'Too short';
          return null;
        },
        terms: (value) => value ? null : 'Must accept terms'
      },
      onSubmit: async (values) => {
        console.log('Form submitted:', values);
        return { success: true, userId: 123 };
      }
    });
    
    console.log('\n=== Test bindToInputs ===');
    form.bindToInputs('#form-container input');
    console.log('✓ Form bound to all inputs');
    
    console.log('\n=== Test handleChange through DOM ===');
    setTimeout(() => {
      const usernameInput = document.getElementById('username');
      usernameInput.value = 'johndoe';
      usernameInput.dispatchEvent(new Event('input', { bubbles: true }));
      
      setTimeout(() => {
        console.log('After input event:', {
          value: form.values.username,
          touched: form.touched.username,
          error: form.errors.username
        });
      }, 100);
    }, 500);
    
    console.log('\n=== Test handleBlur through DOM ===');
    setTimeout(() => {
      const usernameInput = document.getElementById('username');
      usernameInput.dispatchEvent(new Event('blur', { bubbles: true }));
      
      setTimeout(() => {
        console.log('After blur event:', {
          touched: form.touched.username,
          shouldShow: form.shouldShowError('username')
        });
      }, 100);
    }, 1000);
    
    console.log('\n=== Test getFieldProps integration ===');
    setTimeout(() => {
      const emailProps = form.getFieldProps('email');
      console.log('Email field props:', {
        name: emailProps.name,
        value: emailProps.value,
        hasOnChange: typeof emailProps.onChange === 'function',
        hasOnBlur: typeof emailProps.onBlur === 'function'
      });
      
      // Manually trigger handlers
      emailProps.onChange({
        target: { name: 'email', value: 'test@example.com' }
      });
      
      setTimeout(() => {
        console.log('After manual onChange:', form.values.email);
      }, 100);
    }, 1500);
    
    console.log('\n=== Integration Test: Complete Form with Binding ===');
    const integrationForm = ReactiveUtils.form({
      name: '',
      email: '',
      password: ''
    }, {
      validators: {
        name: (value) => value ? null : 'Name required',
        email: (value) => {
          if (!value) return 'Email required';
          if (!/\S+@\S+\.\S+/.test(value)) return 'Invalid email';
          return null;
        },
        password: (value) => {
          if (!value) return 'Password required';
          if (value.length < 6) return 'Too short';
          return null;
        }
      },
      onSubmit: async (values) => {
        console.log('Submitting integration form:', values);
        return { success: true };
      }
    });
    
    setTimeout(() => {
      console.log('\n--- Creating and binding form ---');
      
      // Create form HTML
      const formArea = document.createElement('div');
      formArea.innerHTML = `
        <input type="text" name="name" id="int-name" />
        <input type="email" name="email" id="int-email" />
        <input type="password" name="password" id="int-password" />
      `;
      document.body.appendChild(formArea);
      
      // Bind form
      integrationForm.bindToInputs('#int-name, #int-email, #int-password');
      console.log('1. Form bound');
      
      // Simulate user interaction
      const nameInput = document.getElementById('int-name');
      const emailInput = document.getElementById('int-email');
      const passwordInput = document.getElementById('int-password');
      
      // User fills name
      nameInput.value = 'Alice';
      nameInput.dispatchEvent(new Event('input', { bubbles: true }));
      nameInput.dispatchEvent(new Event('blur', { bubbles: true }));
      
      setTimeout(() => {
        console.log('2. Name field:', {
          value: integrationForm.values.name,
          error: integrationForm.errors.name,
          shouldShow: integrationForm.shouldShowError('name')
        });
        
        // User enters invalid email
        emailInput.value = 'invalid';
        emailInput.dispatchEvent(new Event('input', { bubbles: true }));
        emailInput.dispatchEvent(new Event('blur', { bubbles: true }));
        
        setTimeout(() => {
          console.log('3. Invalid email:', {
            value: integrationForm.values.email,
            error: integrationForm.errors.email,
            shouldShow: integrationForm.shouldShowError('email')
          });
          
          // User fixes email
          emailInput.value = 'alice@example.com';
          emailInput.dispatchEvent(new Event('input', { bubbles: true }));
          
          setTimeout(() => {
            console.log('4. Fixed email:', {
              error: integrationForm.errors.email
            });
            
            // User enters password
            passwordInput.value = 'password123';
            passwordInput.dispatchEvent(new Event('input', { bubbles: true }));
            passwordInput.dispatchEvent(new Event('blur', { bubbles: true }));
            
            setTimeout(async () => {
              console.log('5. Password entered:', {
                value: integrationForm.values.password,
                isValid: integrationForm.isValid
              });
              
              // Submit
              console.log('6. Submitting...');
              const result = await integrationForm.submit();
              console.log('Submit result:', result);
              console.log('submitCount:', integrationForm.submitCount);
              
              // Cleanup
              document.body.removeChild(formArea);
            }, 100);
          }, 100);
        }, 100);
      }, 100);
    }, 2000);
    
    console.log('\n=== Integration Test: Reactive DOM Updates ===');
    const reactiveForm = ReactiveUtils.form({
      field: ''
    });
    
    setTimeout(() => {
      const reactiveArea = document.createElement('div');
      reactiveArea.innerHTML = `<input type="text" name="field" id="reactive-field" />`;
      document.body.appendChild(reactiveArea);
      
      let effectRuns = 0;
      ReactiveUtils.effect(() => {
        effectRuns++;
        const value = reactiveForm.values.field;
        if (effectRuns > 1) {
          console.log(`Effect #${effectRuns}: field = "${value}"`);
        }
      });
      
      reactiveForm.bindToInputs('#reactive-field');
      
      const reactiveInput = document.getElementById('reactive-field');
      reactiveInput.value = 'reactive';
      reactiveInput.dispatchEvent(new Event('input', { bubbles: true }));
      
      setTimeout(() => {
        console.log('Effect runs after input:', effectRuns);
        
        reactiveInput.value = 'updated';
        reactiveInput.dispatchEvent(new Event('input', { bubbles: true }));
        
        setTimeout(() => {
          console.log('Effect runs again:', effectRuns);
          
          // Cleanup
          document.body.removeChild(reactiveArea);
        }, 100);
      }, 100);
    }, 3000);
    
    setTimeout(() => {
      console.log('\n=== Summary ===');
      console.log('✓ bindToInputs(selector) - Bind form to DOM inputs');
      console.log('✓ All event handlers work through bindToInputs');
      console.log('✓ handleChange triggered by input events');
      console.log('✓ handleBlur triggered by blur events');
      console.log('✓ getFieldProps works alongside bindToInputs');
      console.log('✓ Complete integration with validation');
      console.log('✓ Complete integration with submission');
      console.log('✓ All DOM bindings are reactive');
      console.log('✓ Perfect for real-world forms');
    }, 4000);
  </script>
</body>
</html>
