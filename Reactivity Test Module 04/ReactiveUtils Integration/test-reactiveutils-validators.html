<!DOCTYPE html>
<html>
<head><title>Test ReactiveUtils.validators</title></head>
<body>
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script src="../../src/Reactive/04_dh-reactive-form.js"></script>
  <script>
    console.log('=== Testing ReactiveUtils.validators ===');
    
    // Verify validators object exists
    console.log('\n=== Verify validators object ===');
    console.log('ReactiveUtils.validators exists:', !!ReactiveUtils.validators);
    console.log('Type:', typeof ReactiveUtils.validators);
    
    // List all validators
    console.log('\n=== Available validators ===');
    const validatorNames = Object.keys(ReactiveUtils.validators);
    console.log('Validator methods:', validatorNames);
    console.log('Count:', validatorNames.length);
    
    // Test required validator
    console.log('\n=== Test required validator ===');
    const required = ReactiveUtils.validators.required();
    console.log('required()("test"):', required('test'));
    console.log('required()(""):', required(''));
    console.log('required()(null):', required(null));
    console.log('required()(undefined):', required(undefined));
    console.log('required()("  "):', required('  '));
    
    const requiredCustom = ReactiveUtils.validators.required('Custom message');
    console.log('required("Custom msg")(""):', requiredCustom(''));
    
    // Test email validator
    console.log('\n=== Test email validator ===');
    const email = ReactiveUtils.validators.email();
    console.log('email()("test@example.com"):', email('test@example.com'));
    console.log('email()("invalid"):', email('invalid'));
    console.log('email()("test@"):', email('test@'));
    console.log('email()("@example.com"):', email('@example.com'));
    console.log('email()(""):', email(''));
    
    // Test minLength validator
    console.log('\n=== Test minLength validator ===');
    const minLength = ReactiveUtils.validators.minLength(5);
    console.log('minLength(5)("test"):', minLength('test'));
    console.log('minLength(5)("testing"):', minLength('testing'));
    console.log('minLength(5)(""):', minLength(''));
    
    // Test maxLength validator
    console.log('\n=== Test maxLength validator ===');
    const maxLength = ReactiveUtils.validators.maxLength(10);
    console.log('maxLength(10)("test"):', maxLength('test'));
    console.log('maxLength(10)("this is too long"):', maxLength('this is too long'));
    console.log('maxLength(10)(""):', maxLength(''));
    
    // Test pattern validator
    console.log('\n=== Test pattern validator ===');
    const pattern = ReactiveUtils.validators.pattern(/^\d+$/);
    console.log('pattern(/^\\d+$/)("123"):', pattern('123'));
    console.log('pattern(/^\\d+$/)("abc"):', pattern('abc'));
    console.log('pattern(/^\\d+$/)("123abc"):', pattern('123abc'));
    console.log('pattern(/^\\d+$/)(""):', pattern(''));
    
    // Test min validator
    console.log('\n=== Test min validator ===');
    const min = ReactiveUtils.validators.min(18);
    console.log('min(18)("25"):', min('25'));
    console.log('min(18)("15"):', min('15'));
    console.log('min(18)("18"):', min('18'));
    console.log('min(18)(""):', min(''));
    
    // Test max validator
    console.log('\n=== Test max validator ===');
    const max = ReactiveUtils.validators.max(100);
    console.log('max(100)("50"):', max('50'));
    console.log('max(100)("150"):', max('150'));
    console.log('max(100)("100"):', max('100'));
    console.log('max(100)(""):', max(''));
    
    // Test match validator
    console.log('\n=== Test match validator ===');
    const match = ReactiveUtils.validators.match('password');
    const allValues = { password: 'secret123', confirmPassword: 'secret123' };
    console.log('match("password")("secret123", {password: "secret123"}):', 
      match('secret123', allValues));
    console.log('match("password")("different", {password: "secret123"}):', 
      match('different', allValues));
    
    // Test combine validator
    console.log('\n=== Test combine validator ===');
    const combined = ReactiveUtils.validators.combine(
      ReactiveUtils.validators.required('Field required'),
      ReactiveUtils.validators.minLength(3, 'Min 3 chars'),
      ReactiveUtils.validators.maxLength(10, 'Max 10 chars')
    );
    console.log('combine validators:');
    console.log('  (""):', combined(''));
    console.log('  ("ab"):', combined('ab'));
    console.log('  ("test"):', combined('test'));
    console.log('  ("this is way too long"):', combined('this is way too long'));
    
    // Test custom validator
    console.log('\n=== Test custom validator ===');
    const custom = ReactiveUtils.validators.custom((value) => {
      if (!value) return null;
      if (value.toLowerCase() === 'admin') return 'Username "admin" is reserved';
      return null;
    });
    console.log('custom()("user"):', custom('user'));
    console.log('custom()("admin"):', custom('admin'));
    console.log('custom()("ADMIN"):', custom('ADMIN'));
    
    // Use validators in a form
    console.log('\n=== Use validators in a form ===');
    const form = ReactiveUtils.form({
      username: '',
      email: '',
      password: '',
      confirmPassword: '',
      age: ''
    }, {
      validators: {
        username: ReactiveUtils.validators.combine(
          ReactiveUtils.validators.required('Username is required'),
          ReactiveUtils.validators.minLength(3, 'Username must be at least 3 characters')
        ),
        email: ReactiveUtils.validators.combine(
          ReactiveUtils.validators.required('Email is required'),
          ReactiveUtils.validators.email('Invalid email address')
        ),
        password: ReactiveUtils.validators.combine(
          ReactiveUtils.validators.required('Password is required'),
          ReactiveUtils.validators.minLength(8, 'Password must be at least 8 characters')
        ),
        confirmPassword: ReactiveUtils.validators.match('password', 'Passwords must match'),
        age: ReactiveUtils.validators.combine(
          ReactiveUtils.validators.required('Age is required'),
          ReactiveUtils.validators.min(18, 'Must be 18 or older'),
          ReactiveUtils.validators.max(120, 'Invalid age')
        )
      }
    });
    
    console.log('Form created with validators:', !!form);
    
    // Test invalid values
    console.log('\nTest with invalid values:');
    form.setValues({
      username: 'ab',
      email: 'invalid',
      password: 'short',
      confirmPassword: 'different',
      age: '15'
    });
    form.validate();
    console.log('Errors:', form.errors);
    console.log('isValid:', form.isValid);
    
    // Test valid values
    console.log('\nTest with valid values:');
    form.setValues({
      username: 'johndoe',
      email: 'john@example.com',
      password: 'password123',
      confirmPassword: 'password123',
      age: '25'
    });
    form.validate();
    console.log('Errors:', form.errors);
    console.log('isValid:', form.isValid);
    
    console.log('\n=== Summary ===');
    console.log('✓ ReactiveUtils.validators exists');
    console.log('✓ validators.required() validates required fields');
    console.log('✓ validators.email() validates email format');
    console.log('✓ validators.minLength() validates minimum length');
    console.log('✓ validators.maxLength() validates maximum length');
    console.log('✓ validators.pattern() validates against regex');
    console.log('✓ validators.min() validates minimum numeric value');
    console.log('✓ validators.max() validates maximum numeric value');
    console.log('✓ validators.match() validates field matching');
    console.log('✓ validators.custom() creates custom validators');
    console.log('✓ validators.combine() combines multiple validators');
    console.log('✓ All validators integrate with ReactiveUtils.form()');
  </script>
</body>
</html>
