<!DOCTYPE html>
<html>
<head><title>Test All Validation, Reset, and Submission Methods</title></head>
<body>
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script src="../../src/Reactive/04_dh-reactive-form.js"></script>
  <script>
    console.log('=== Testing All Validation, Reset, and Submission Methods ===');
    
    // Create comprehensive form
    const form = ReactiveUtils.form({
      username: '',
      email: '',
      password: '',
      confirmPassword: ''
    }, {
      validators: {
        username: (value) => {
          if (!value) return 'Username required';
          if (value.length < 3) return 'Too short';
          return null;
        },
        email: (value) => {
          if (!value) return 'Email required';
          if (!/\S+@\S+\.\S+/.test(value)) return 'Invalid email';
          return null;
        },
        password: (value) => {
          if (!value) return 'Password required';
          if (value.length < 6) return 'Too short';
          return null;
        },
        confirmPassword: (value, values) => {
          if (value !== values.password) return 'Must match';
          return null;
        }
      },
      onSubmit: async (values) => {
        console.log('Form submitted with:', values);
        return { userId: 123, success: true };
      }
    });
    
    console.log('\n=== Test validateField ===');
    form.setValue('username', 'ab');
    const usernameValid = form.validateField('username');
    console.log('validateField("username"):', {
      valid: usernameValid,
      error: form.getError('username')
    });
    
    form.setValue('username', 'validuser');
    form.validateField('username');
    console.log('After fixing:', {
      valid: form.validateField('username'),
      error: form.getError('username')
    });
    
    console.log('\n=== Test validate ===');
    const allValid = form.validate();
    console.log('validate() all fields:', {
      valid: allValid,
      errors: form.errors,
      errorFields: form.errorFields
    });
    
    console.log('\n=== Test reset ===');
    form.setValues({
      username: 'john',
      email: 'john@example.com',
      password: 'secret123',
      confirmPassword: 'secret123'
    });
    form.touchAll();
    form.validate();
    
    console.log('Before reset:', {
      values: form.values,
      touched: form.touched,
      errors: form.errors
    });
    
    form.reset();
    console.log('After reset():', {
      values: form.values,
      touched: form.touched,
      errors: form.errors,
      isDirty: form.isDirty
    });
    
    console.log('\n=== Test resetField ===');
    form.setValues({
      username: 'changed1',
      email: 'changed2',
      password: 'changed3'
    });
    form.setErrors({
      username: 'Error1',
      email: 'Error2'
    });
    
    console.log('Before resetField:', {
      values: form.values,
      errors: form.errors
    });
    
    form.resetField('username');
    console.log('After resetField("username"):', {
      values: form.values,
      errors: form.errors
    });
    
    console.log('\n=== Test submit ===');
    setTimeout(async () => {
      // Invalid submission
      form.reset();
      console.log('Attempting invalid submit...');
      const invalidResult = await form.submit();
      console.log('Invalid submit result:', invalidResult);
      console.log('Errors shown:', form.errorFields.map(f => 
        `${f}: ${form.shouldShowError(f)}`
      ));
      
      // Valid submission
      form.setValues({
        username: 'johndoe',
        email: 'john@example.com',
        password: 'password123',
        confirmPassword: 'password123'
      });
      
      console.log('Attempting valid submit...');
      const validResult = await form.submit();
      console.log('Valid submit result:', validResult);
      console.log('submitCount:', form.submitCount);
    }, 500);
    
    console.log('\n=== Integration Test: Complete Form Flow ===');
    const flowForm = ReactiveUtils.form({
      name: '',
      email: '',
      password: ''
    }, {
      validators: {
        name: (value) => value ? null : 'Name required',
        email: (value) => {
          if (!value) return 'Email required';
          if (!/\S+@\S+\.\S+/.test(value)) return 'Invalid email';
          return null;
        },
        password: (value) => {
          if (!value) return 'Password required';
          if (value.length < 6) return 'Too short';
          return null;
        }
      },
      onSubmit: async (values) => {
        console.log('Submitting:', values);
        await new Promise(resolve => setTimeout(resolve, 100));
        return { success: true, userId: 456 };
      }
    });
    
    setTimeout(async () => {
      console.log('\n--- Step 1: User fills form ---');
      flowForm.setValue('name', 'Alice');
      flowForm.setTouched('name');
      flowForm.validateField('name');
      console.log('Name:', {
        value: flowForm.getValue('name'),
        error: flowForm.getError('name'),
        shouldShow: flowForm.shouldShowError('name')
      });
      
      flowForm.setValue('email', 'invalid');
      flowForm.setTouched('email');
      flowForm.validateField('email');
      console.log('Email (invalid):', {
        value: flowForm.getValue('email'),
        error: flowForm.getError('email'),
        shouldShow: flowForm.shouldShowError('email')
      });
      
      console.log('\n--- Step 2: User fixes email ---');
      flowForm.setValue('email', 'alice@example.com');
      flowForm.validateField('email');
      console.log('Email (fixed):', {
        error: flowForm.getError('email'),
        shouldShow: flowForm.shouldShowError('email')
      });
      
      console.log('\n--- Step 3: User tries to submit ---');
      let result = await flowForm.submit();
      console.log('First submit (missing password):', result);
      
      console.log('\n--- Step 4: User adds password ---');
      flowForm.setValue('password', 'password123');
      flowForm.validateField('password');
      
      console.log('\n--- Step 5: User submits successfully ---');
      result = await flowForm.submit();
      console.log('Second submit (valid):', result);
      console.log('submitCount:', flowForm.submitCount);
      
      console.log('\n--- Step 6: Reset for new entry ---');
      flowForm.reset();
      console.log('After reset:', {
        values: flowForm.values,
        errors: flowForm.errors,
        touched: flowForm.touched,
        isDirty: flowForm.isDirty,
        submitCount: flowForm.submitCount
      });
    }, 1000);
    
    console.log('\n=== Integration Test: Chaining ===');
    const chainForm = ReactiveUtils.form({
      field1: 'initial1',
      field2: 'initial2'
    }, {
      validators: {
        field1: (value) => value ? null : 'Required',
        field2: (value) => value ? null : 'Required'
      }
    });
    
    setTimeout(() => {
      chainForm
        .setValue('field1', 'value1')
        .validateField('field1')
        .setValue('field2', '')
        .validateField('field2')
        .resetField('field1');
      
      console.log('After chained operations:', {
        values: chainForm.values,
        errors: chainForm.errors
      });
    }, 2000);
    
    console.log('\n=== Integration Test: Reactive Updates ===');
    const reactiveForm = ReactiveUtils.form({
      field: ''
    }, {
      validators: {
        field: (value) => value ? null : 'Required'
      }
    });
    
    let effectRuns = 0;
    ReactiveUtils.effect(() => {
      effectRuns++;
      const isValid = reactiveForm.isValid;
      const isDirty = reactiveForm.isDirty;
      if (effectRuns > 1) {
        console.log(`Effect #${effectRuns}: isValid=${isValid}, isDirty=${isDirty}`);
      }
    });
    
    setTimeout(() => {
      reactiveForm.setValue('field', 'value');
      console.log('Effect runs after setValue:', effectRuns);
      
      reactiveForm.validateField('field');
      console.log('Effect runs after validateField:', effectRuns);
      
      reactiveForm.reset();
      console.log('Effect runs after reset:', effectRuns);
    }, 2500);
    
    setTimeout(() => {
      console.log('\n=== Summary ===');
      console.log('✓ validateField(field) - Validate single field');
      console.log('✓ validate() - Validate all fields');
      console.log('✓ reset(newValues) - Reset form');
      console.log('✓ resetField(field) - Reset single field');
      console.log('✓ submit(handler) - Handle submission');
      console.log('✓ All methods work together seamlessly');
      console.log('✓ All methods are chainable (except submit)');
      console.log('✓ All methods are reactive');
      console.log('✓ Complete form validation and submission system');
      console.log('✓ Perfect for real-world form workflows');
    }, 3000);
  </script>
</body>
</html>
