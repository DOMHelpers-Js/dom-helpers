<!DOCTYPE html>
<html>
<head><title>Test Forms.validators</title></head>
<body>
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script src="../../src/Reactive/04_dh-reactive-form.js"></script>

  <script>
    console.log('=== Testing Forms.validators ===\n');

    // ========================================================================
    // TEST 1: Forms.validators.required
    // ========================================================================
    console.log('TEST 1: Forms.validators.required');
    const requiredValidator = Forms.validators.required('This field is required');

    console.log('  Empty string:', requiredValidator(''));
    console.log('  Expected: "This field is required"');
    console.log('  Non-empty string:', requiredValidator('value'));
    console.log('  Expected: undefined');
    console.log('  Zero number:', requiredValidator(0));
    console.log('  Expected: undefined (0 is valid)');
    console.log('  False boolean:', requiredValidator(false));
    console.log('  Expected: undefined (false is valid)');
    console.log('  Null:', requiredValidator(null));
    console.log('  Expected: "This field is required"');
    console.log('  Undefined:', requiredValidator(undefined));
    console.log('  Expected: "This field is required"');
    console.log('  ✓ required validator works\n');

    // ========================================================================
    // TEST 2: Forms.validators.email
    // ========================================================================
    console.log('TEST 2: Forms.validators.email');
    const emailValidator = Forms.validators.email('Invalid email address');

    console.log('  Valid email:', emailValidator('user@example.com'));
    console.log('  Expected: undefined');
    console.log('  Valid complex:', emailValidator('john.doe+tag@example.co.uk'));
    console.log('  Expected: undefined');
    console.log('  Invalid - no @:', emailValidator('userexample.com'));
    console.log('  Expected: "Invalid email address"');
    console.log('  Invalid - no domain:', emailValidator('user@'));
    console.log('  Expected: "Invalid email address"');
    console.log('  Invalid - spaces:', emailValidator('user @example.com'));
    console.log('  Expected: "Invalid email address"');
    console.log('  Empty string:', emailValidator(''));
    console.log('  Expected: undefined (empty allowed)');
    console.log('  ✓ email validator works\n');

    // ========================================================================
    // TEST 3: Forms.validators.minLength
    // ========================================================================
    console.log('TEST 3: Forms.validators.minLength');
    const minLengthValidator = Forms.validators.minLength(5, 'Must be at least 5 characters');

    console.log('  Length 3:', minLengthValidator('abc'));
    console.log('  Expected: "Must be at least 5 characters"');
    console.log('  Length 5:', minLengthValidator('abcde'));
    console.log('  Expected: undefined');
    console.log('  Length 10:', minLengthValidator('abcdefghij'));
    console.log('  Expected: undefined');
    console.log('  Empty string:', minLengthValidator(''));
    console.log('  Expected: "Must be at least 5 characters"');
    console.log('  ✓ minLength validator works\n');

    // ========================================================================
    // TEST 4: Forms.validators.maxLength
    // ========================================================================
    console.log('TEST 4: Forms.validators.maxLength');
    const maxLengthValidator = Forms.validators.maxLength(10, 'Must be at most 10 characters');

    console.log('  Length 5:', maxLengthValidator('abcde'));
    console.log('  Expected: undefined');
    console.log('  Length 10:', maxLengthValidator('abcdefghij'));
    console.log('  Expected: undefined');
    console.log('  Length 15:', maxLengthValidator('abcdefghijklmno'));
    console.log('  Expected: "Must be at most 10 characters"');
    console.log('  Empty string:', maxLengthValidator(''));
    console.log('  Expected: undefined');
    console.log('  ✓ maxLength validator works\n');

    // ========================================================================
    // TEST 5: Forms.validators.min
    // ========================================================================
    console.log('TEST 5: Forms.validators.min');
    const minValidator = Forms.validators.min(18, 'Must be at least 18');

    console.log('  Value 10:', minValidator(10));
    console.log('  Expected: "Must be at least 18"');
    console.log('  Value 18:', minValidator(18));
    console.log('  Expected: undefined');
    console.log('  Value 25:', minValidator(25));
    console.log('  Expected: undefined');
    console.log('  String number:', minValidator('20'));
    console.log('  Expected: undefined (coercion)');
    console.log('  ✓ min validator works\n');

    // ========================================================================
    // TEST 6: Forms.validators.max
    // ========================================================================
    console.log('TEST 6: Forms.validators.max');
    const maxValidator = Forms.validators.max(100, 'Must be at most 100');

    console.log('  Value 50:', maxValidator(50));
    console.log('  Expected: undefined');
    console.log('  Value 100:', maxValidator(100));
    console.log('  Expected: undefined');
    console.log('  Value 150:', maxValidator(150));
    console.log('  Expected: "Must be at most 100"');
    console.log('  ✓ max validator works\n');

    // ========================================================================
    // TEST 7: Forms.validators.pattern
    // ========================================================================
    console.log('TEST 7: Forms.validators.pattern');
    const urlPattern = Forms.validators.pattern(/^https?:\/\//, 'Must be a valid URL');
    const phonePattern = Forms.validators.pattern(/^\d{3}-\d{3}-\d{4}$/, 'Format: XXX-XXX-XXXX');

    console.log('  Valid URL http:', urlPattern('http://example.com'));
    console.log('  Expected: undefined');
    console.log('  Valid URL https:', urlPattern('https://example.com'));
    console.log('  Expected: undefined');
    console.log('  Invalid URL:', urlPattern('example.com'));
    console.log('  Expected: "Must be a valid URL"');

    console.log('  Valid phone:', phonePattern('123-456-7890'));
    console.log('  Expected: undefined');
    console.log('  Invalid phone:', phonePattern('1234567890'));
    console.log('  Expected: "Format: XXX-XXX-XXXX"');
    console.log('  ✓ pattern validator works\n');

    // ========================================================================
    // TEST 8: Forms.validators.match
    // ========================================================================
    console.log('TEST 8: Forms.validators.match');
    const form = Forms.create({
      password: '',
      confirmPassword: ''
    });

    const matchValidator = Forms.validators.match('password', 'Passwords must match');

    form.setValue('password', 'secret123');
    form.setValue('confirmPassword', 'secret123');

    console.log('  Matching passwords:', matchValidator(form.values.confirmPassword, form.values));
    console.log('  Expected: undefined');

    form.setValue('confirmPassword', 'different');
    console.log('  Non-matching:', matchValidator(form.values.confirmPassword, form.values));
    console.log('  Expected: "Passwords must match"');
    console.log('  ✓ match validator works\n');

    // ========================================================================
    // TEST 9: Forms.validators.custom
    // ========================================================================
    console.log('TEST 9: Forms.validators.custom');
    const customValidator = Forms.validators.custom(
      (value) => {
        if (value.toLowerCase().includes('admin')) {
          return 'Username cannot contain "admin"';
        }
      }
    );

    console.log('  Valid username:', customValidator('john_doe'));
    console.log('  Expected: undefined');
    console.log('  Invalid with admin:', customValidator('admin123'));
    console.log('  Expected: "Username cannot contain "admin""');
    console.log('  Invalid with ADMIN:', customValidator('ADMIN_USER'));
    console.log('  Expected: "Username cannot contain "admin""');
    console.log('  ✓ custom validator works\n');

    // ========================================================================
    // TEST 10: Forms.validators.combine
    // ========================================================================
    console.log('TEST 10: Forms.validators.combine');
    const combinedValidator = Forms.validators.combine(
      Forms.validators.required('Required'),
      Forms.validators.minLength(3, 'Min 3 chars'),
      Forms.validators.maxLength(10, 'Max 10 chars')
    );

    console.log('  Empty string:', combinedValidator(''));
    console.log('  Expected: "Required"');
    console.log('  Too short:', combinedValidator('ab'));
    console.log('  Expected: "Min 3 chars"');
    console.log('  Too long:', combinedValidator('12345678901'));
    console.log('  Expected: "Max 10 chars"');
    console.log('  Valid length:', combinedValidator('valid'));
    console.log('  Expected: undefined');
    console.log('  ✓ combine validator works\n');

    // ========================================================================
    // TEST 11: Validators in form context
    // ========================================================================
    console.log('TEST 11: Validators in form context');
    const registrationForm = Forms.create(
      {
        username: '',
        email: '',
        age: 0,
        website: '',
        password: '',
        confirmPassword: ''
      },
      {
        validators: {
          username: Forms.validators.combine(
            Forms.validators.required(),
            Forms.validators.minLength(3),
            Forms.validators.maxLength(20)
          ),
          email: Forms.validators.email(),
          age: Forms.validators.min(18, 'Must be 18 or older'),
          website: Forms.validators.pattern(/^https?:\/\//, 'Must start with http:// or https://'),
          password: Forms.validators.minLength(8, 'Password must be at least 8 characters'),
          confirmPassword: Forms.validators.match('password', 'Passwords must match')
        }
      }
    );

    // Test invalid form
    const invalid = registrationForm.validate();
    console.log('  Empty form valid:', invalid);
    console.log('  Expected: false');
    console.log('  Error count:', Object.keys(registrationForm.errors).length);
    console.log('  Expected: > 0');

    // Fill with valid data
    registrationForm.setValues({
      username: 'john_doe',
      email: 'john@example.com',
      age: 25,
      website: 'https://johndoe.com',
      password: 'password123',
      confirmPassword: 'password123'
    });

    const valid = registrationForm.validate();
    console.log('  Valid form:', valid);
    console.log('  Expected: true');
    console.log('  Error count:', Object.keys(registrationForm.errors).length);
    console.log('  Expected: 0');
    console.log('  ✓ Validators in form work\n');

    // ========================================================================
    // TEST 12: Default error messages
    // ========================================================================
    console.log('TEST 12: Default error messages');
    const defaultRequired = Forms.validators.required();
    const defaultEmail = Forms.validators.email();
    const defaultMinLength = Forms.validators.minLength(5);

    console.log('  required() default:', defaultRequired(''));
    console.log('  Expected: "This field is required"');
    console.log('  email() default:', defaultEmail('invalid'));
    console.log('  Expected: "Please enter a valid email"');
    console.log('  minLength() default:', defaultMinLength('abc'));
    console.log('  Expected: string containing "at least 5"');
    console.log('  ✓ Default messages work\n');

    // ========================================================================
    // TEST 13: Practical password strength validator
    // ========================================================================
    console.log('TEST 13: Practical password strength validator');
    const passwordStrength = Forms.validators.custom((value) => {
      if (!value) return;
      if (value.length < 8) return 'Password must be at least 8 characters';
      if (!/[A-Z]/.test(value)) return 'Password must contain uppercase letter';
      if (!/[a-z]/.test(value)) return 'Password must contain lowercase letter';
      if (!/[0-9]/.test(value)) return 'Password must contain number';
      if (!/[^A-Za-z0-9]/.test(value)) return 'Password must contain special character';
    });

    console.log('  Weak password:', passwordStrength('weak'));
    console.log('  Expected: error message');
    console.log('  No uppercase:', passwordStrength('password123!'));
    console.log('  Expected: "must contain uppercase"');
    console.log('  No special:', passwordStrength('Password123'));
    console.log('  Expected: "must contain special character"');
    console.log('  Strong password:', passwordStrength('Password123!'));
    console.log('  Expected: undefined');
    console.log('  ✓ Password strength works\n');

    // ========================================================================
    // TEST 14: Async validator simulation
    // ========================================================================
    console.log('TEST 14: Async validator simulation');
    const asyncUsernameCheck = Forms.validators.custom(async (value) => {
      // Simulate API call
      await new Promise(resolve => setTimeout(resolve, 10));
      const takenUsernames = ['admin', 'root', 'user'];
      if (takenUsernames.includes(value.toLowerCase())) {
        return 'Username already taken';
      }
    });

    asyncUsernameCheck('newuser').then(result => {
      console.log('  Available username:', result);
      console.log('  Expected: undefined');

      asyncUsernameCheck('admin').then(result2 => {
        console.log('  Taken username:', result2);
        console.log('  Expected: "Username already taken"');
        console.log('  ✓ Async validation works\n');

        // ====================================================================
        // TEST 15: Validator edge cases
        // ====================================================================
        console.log('TEST 15: Validator edge cases');
        const edgeRequired = Forms.validators.required();
        const edgeEmail = Forms.validators.email();

        console.log('  Whitespace only:', edgeRequired('   '));
        console.log('  Expected: "This field is required"');
        console.log('  Email with spaces:', edgeEmail(' user@example.com '));
        console.log('  Expected: error (spaces invalid)');
        console.log('  Number to email:', edgeEmail(12345));
        console.log('  Expected: error');

        const edgeMin = Forms.validators.min(0);
        console.log('  Negative number:', edgeMin(-5));
        console.log('  Expected: error');
        console.log('  Zero (boundary):', edgeMin(0));
        console.log('  Expected: undefined');
        console.log('  ✓ Edge cases handled\n');

        console.log('=== All Forms.validators tests completed ===');
      });
    });
  </script>
</body>
</html>
