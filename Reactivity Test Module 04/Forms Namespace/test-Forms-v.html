<!DOCTYPE html>
<html>
<head><title>Test Forms.v</title></head>
<body>
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script src="../../src/Reactive/04_dh-reactive-form.js"></script>

  <script>
    console.log('=== Testing Forms.v (alias for Forms.validators) ===\n');

    // ========================================================================
    // TEST 1: Forms.v is alias for Forms.validators
    // ========================================================================
    console.log('TEST 1: Forms.v is alias for Forms.validators');
    console.log('  Forms.v === Forms.validators:', Forms.v === Forms.validators);
    console.log('  Expected: true');
    console.log('  Forms.v is object:', typeof Forms.v === 'object');
    console.log('  Expected: true');
    console.log('  ✓ Forms.v is alias\n');

    // ========================================================================
    // TEST 2: Forms.v.required
    // ========================================================================
    console.log('TEST 2: Forms.v.required');
    const required = Forms.v.required('Field is required');

    console.log('  Empty string:', required(''));
    console.log('  Expected: "Field is required"');
    console.log('  Valid value:', required('value'));
    console.log('  Expected: undefined');
    console.log('  Same as Forms.validators.required:',
      Forms.v.required === Forms.validators.required);
    console.log('  Expected: true');
    console.log('  ✓ Forms.v.required works\n');

    // ========================================================================
    // TEST 3: Forms.v.email
    // ========================================================================
    console.log('TEST 3: Forms.v.email');
    const email = Forms.v.email();

    console.log('  Valid email:', email('user@example.com'));
    console.log('  Expected: undefined');
    console.log('  Invalid email:', email('invalid'));
    console.log('  Expected: error message');
    console.log('  Same as Forms.validators.email:',
      Forms.v.email === Forms.validators.email);
    console.log('  Expected: true');
    console.log('  ✓ Forms.v.email works\n');

    // ========================================================================
    // TEST 4: Forms.v.minLength
    // ========================================================================
    console.log('TEST 4: Forms.v.minLength');
    const minLength = Forms.v.minLength(5);

    console.log('  Too short:', minLength('abc'));
    console.log('  Expected: error message');
    console.log('  Valid length:', minLength('abcdef'));
    console.log('  Expected: undefined');
    console.log('  Same as Forms.validators.minLength:',
      Forms.v.minLength === Forms.validators.minLength);
    console.log('  Expected: true');
    console.log('  ✓ Forms.v.minLength works\n');

    // ========================================================================
    // TEST 5: Forms.v.maxLength
    // ========================================================================
    console.log('TEST 5: Forms.v.maxLength');
    const maxLength = Forms.v.maxLength(10);

    console.log('  Valid length:', maxLength('short'));
    console.log('  Expected: undefined');
    console.log('  Too long:', maxLength('this is too long'));
    console.log('  Expected: error message');
    console.log('  Same as Forms.validators.maxLength:',
      Forms.v.maxLength === Forms.validators.maxLength);
    console.log('  Expected: true');
    console.log('  ✓ Forms.v.maxLength works\n');

    // ========================================================================
    // TEST 6: Forms.v.min and Forms.v.max
    // ========================================================================
    console.log('TEST 6: Forms.v.min and Forms.v.max');
    const min18 = Forms.v.min(18);
    const max100 = Forms.v.max(100);

    console.log('  min(18) - value 15:', min18(15));
    console.log('  Expected: error message');
    console.log('  min(18) - value 25:', min18(25));
    console.log('  Expected: undefined');

    console.log('  max(100) - value 50:', max100(50));
    console.log('  Expected: undefined');
    console.log('  max(100) - value 150:', max100(150));
    console.log('  Expected: error message');
    console.log('  ✓ Forms.v.min/max work\n');

    // ========================================================================
    // TEST 7: Forms.v.pattern
    // ========================================================================
    console.log('TEST 7: Forms.v.pattern');
    const urlPattern = Forms.v.pattern(/^https?:\/\//);

    console.log('  Valid URL:', urlPattern('https://example.com'));
    console.log('  Expected: undefined');
    console.log('  Invalid URL:', urlPattern('example.com'));
    console.log('  Expected: error message');
    console.log('  Same as Forms.validators.pattern:',
      Forms.v.pattern === Forms.validators.pattern);
    console.log('  Expected: true');
    console.log('  ✓ Forms.v.pattern works\n');

    // ========================================================================
    // TEST 8: Forms.v.match
    // ========================================================================
    console.log('TEST 8: Forms.v.match');
    const form = Forms.create({
      password: 'secret123',
      confirmPassword: 'secret123'
    });

    const matchValidator = Forms.v.match('password');
    console.log('  Matching values:', matchValidator(form.values.confirmPassword, form.values));
    console.log('  Expected: undefined');

    form.setValue('confirmPassword', 'different');
    console.log('  Non-matching:', matchValidator(form.values.confirmPassword, form.values));
    console.log('  Expected: error message');
    console.log('  ✓ Forms.v.match works\n');

    // ========================================================================
    // TEST 9: Forms.v.custom
    // ========================================================================
    console.log('TEST 9: Forms.v.custom');
    const customValidator = Forms.v.custom((value) => {
      if (value && value.length > 0 && value[0] !== value[0].toUpperCase()) {
        return 'Must start with uppercase letter';
      }
    });

    console.log('  Lowercase start:', customValidator('hello'));
    console.log('  Expected: "Must start with uppercase letter"');
    console.log('  Uppercase start:', customValidator('Hello'));
    console.log('  Expected: undefined');
    console.log('  Same as Forms.validators.custom:',
      Forms.v.custom === Forms.validators.custom);
    console.log('  Expected: true');
    console.log('  ✓ Forms.v.custom works\n');

    // ========================================================================
    // TEST 10: Forms.v.combine
    // ========================================================================
    console.log('TEST 10: Forms.v.combine');
    const combined = Forms.v.combine(
      Forms.v.required(),
      Forms.v.minLength(3),
      Forms.v.maxLength(10)
    );

    console.log('  Empty:', combined(''));
    console.log('  Expected: required error');
    console.log('  Too short:', combined('ab'));
    console.log('  Expected: minLength error');
    console.log('  Valid:', combined('valid'));
    console.log('  Expected: undefined');
    console.log('  Same as Forms.validators.combine:',
      Forms.v.combine === Forms.validators.combine);
    console.log('  Expected: true');
    console.log('  ✓ Forms.v.combine works\n');

    // ========================================================================
    // TEST 11: Using Forms.v in form creation
    // ========================================================================
    console.log('TEST 11: Using Forms.v in form creation');
    const loginForm = Forms.create(
      { email: '', password: '' },
      {
        validators: {
          email: Forms.v.email(),
          password: Forms.v.minLength(6)
        }
      }
    );

    loginForm.setValue('email', 'invalid');
    loginForm.setValue('password', '123');

    console.log('  Invalid email error:', !!loginForm.errors.email);
    console.log('  Expected: true');
    console.log('  Short password error:', !!loginForm.errors.password);
    console.log('  Expected: true');

    loginForm.setValue('email', 'user@example.com');
    loginForm.setValue('password', 'secret123');

    console.log('  Valid email error:', loginForm.errors.email);
    console.log('  Expected: undefined');
    console.log('  Valid password error:', loginForm.errors.password);
    console.log('  Expected: undefined');
    console.log('  ✓ Forms.v in form creation works\n');

    // ========================================================================
    // TEST 12: All validator methods available
    // ========================================================================
    console.log('TEST 12: All validator methods available');
    console.log('  Has required:', typeof Forms.v.required === 'function');
    console.log('  Has email:', typeof Forms.v.email === 'function');
    console.log('  Has minLength:', typeof Forms.v.minLength === 'function');
    console.log('  Has maxLength:', typeof Forms.v.maxLength === 'function');
    console.log('  Has min:', typeof Forms.v.min === 'function');
    console.log('  Has max:', typeof Forms.v.max === 'function');
    console.log('  Has pattern:', typeof Forms.v.pattern === 'function');
    console.log('  Has match:', typeof Forms.v.match === 'function');
    console.log('  Has custom:', typeof Forms.v.custom === 'function');
    console.log('  Has combine:', typeof Forms.v.combine === 'function');
    console.log('  Expected: all true');
    console.log('  ✓ All methods available\n');

    // ========================================================================
    // TEST 13: Practical registration form with Forms.v
    // ========================================================================
    console.log('TEST 13: Practical registration form with Forms.v');
    const registrationForm = Forms.create(
      {
        username: '',
        email: '',
        password: '',
        confirmPassword: '',
        age: 0
      },
      {
        validators: {
          username: Forms.v.combine(
            Forms.v.required(),
            Forms.v.minLength(3),
            Forms.v.maxLength(20)
          ),
          email: Forms.v.email(),
          password: Forms.v.minLength(8),
          confirmPassword: Forms.v.match('password'),
          age: Forms.v.min(18)
        }
      }
    );

    registrationForm.setValues({
      username: 'john_doe',
      email: 'john@example.com',
      password: 'password123',
      confirmPassword: 'password123',
      age: 25
    });

    const isValid = registrationForm.validate();
    console.log('  Form valid:', isValid);
    console.log('  Expected: true');
    console.log('  Has errors:', registrationForm.hasErrors);
    console.log('  Expected: false');
    console.log('  ✓ Registration form works\n');

    // ========================================================================
    // TEST 14: Interchangeable with Forms.validators
    // ========================================================================
    console.log('TEST 14: Interchangeable with Forms.validators');
    const form1 = Forms.create(
      { field: '' },
      { validators: { field: Forms.v.required() } }
    );

    const form2 = Forms.create(
      { field: '' },
      { validators: { field: Forms.validators.required() } }
    );

    form1.setValue('field', '');
    form2.setValue('field', '');

    console.log('  Form1 error:', form1.errors.field);
    console.log('  Form2 error:', form2.errors.field);
    console.log('  Both have same error:',
      form1.errors.field === form2.errors.field);
    console.log('  Expected: true (interchangeable)');
    console.log('  ✓ Completely interchangeable\n');

    // ========================================================================
    // TEST 15: Shorthand convenience in complex scenarios
    // ========================================================================
    console.log('TEST 15: Shorthand convenience in complex scenarios');
    const complexForm = Forms.create(
      {
        username: '',
        email: '',
        password: '',
        confirmPassword: '',
        website: '',
        bio: ''
      },
      {
        validators: {
          // Demonstrates shorthand convenience
          username: Forms.v.combine(Forms.v.required(), Forms.v.minLength(3)),
          email: Forms.v.email(),
          password: Forms.v.combine(Forms.v.required(), Forms.v.minLength(8)),
          confirmPassword: Forms.v.match('password'),
          website: Forms.v.pattern(/^https?:\/\//),
          bio: Forms.v.maxLength(500)
        }
      }
    );

    console.log('  Complex form created:', !!complexForm);
    console.log('  Has all validators:', Object.keys(complexForm.validators || {}).length);
    console.log('  Expected: 6 validators');
    console.log('  Shorthand is concise:', 'Forms.v.required()'.length < 'Forms.validators.required()'.length);
    console.log('  Expected: true (v is shorter)');
    console.log('  ✓ Shorthand convenience works\n');

    console.log('=== All Forms.v tests completed ===');
  </script>
</body>
</html>
