<!DOCTYPE html>
<html>
<head><title>Test ReactiveUtils.reactive()</title></head>
<body>
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script>
    console.log('=== Testing ReactiveUtils.reactive() ===');
    
    // Basic reactive builder
    console.log('\n=== Basic reactive builder ===');
    const builder = ReactiveUtils.reactive({
      count: 0,
      name: 'Test'
    });
    
    console.log('Created builder:', builder);
    console.log('Type check:', typeof builder === 'object');
    console.log('Has state:', builder.state);
    console.log('State values:', builder.state);
    
    // Builder methods available
    console.log('\n=== Builder methods available ===');
    console.log('Has computed:', typeof builder.computed === 'function');
    console.log('Has watch:', typeof builder.watch === 'function');
    console.log('Has effect:', typeof builder.effect === 'function');
    console.log('Has bind:', typeof builder.bind === 'function');
    console.log('Has action:', typeof builder.action === 'function');
    console.log('Has actions:', typeof builder.actions === 'function');
    console.log('Has build:', typeof builder.build === 'function');
    console.log('Has destroy:', typeof builder.destroy === 'function');
    
    // Build with computed
    console.log('\n=== Build with computed ===');
    const counter = ReactiveUtils.reactive({ count: 0 })
      .computed({
        doubled: function() { return this.count * 2; },
        tripled: function() { return this.count * 3; }
      })
      .build();
    
    console.log('State:', counter);
    console.log('count:', counter.count);
    console.log('doubled (computed):', counter.doubled);
    console.log('tripled (computed):', counter.tripled);
    
    counter.count = 5;
    console.log('After count = 5:');
    console.log('  doubled:', counter.doubled);
    console.log('  tripled:', counter.tripled);
    
    // Build with watch
    console.log('\n=== Build with watch ===');
    let watchRuns = 0;
    const watched = ReactiveUtils.reactive({ value: 10 })
      .watch({
        value: (newVal, oldVal) => {
          watchRuns++;
          console.log(`Watch #${watchRuns}: ${oldVal} → ${newVal}`);
        }
      })
      .build();
    
    setTimeout(() => {
      watched.value = 20;
      console.log('Watch runs after value = 20:', watchRuns);
    }, 500);
    
    setTimeout(() => {
      watched.value = 30;
      console.log('Watch runs after value = 30:', watchRuns);
    }, 1000);
    
    // Build with effect
    console.log('\n=== Build with effect ===');
    let effectRuns = 0;
    const effected = ReactiveUtils.reactive({ x: 1, y: 2 })
      .effect(function() {
        effectRuns++;
        const sum = this.x + this.y;
        console.log(`Effect #${effectRuns}: x + y = ${sum}`);
      })
      .build();
    
    setTimeout(() => {
      effected.x = 5;
      console.log('Effect runs after x = 5:', effectRuns);
    }, 1500);
    
    // Build with actions
    console.log('\n=== Build with actions ===');
    const actioned = ReactiveUtils.reactive({ count: 0 })
      .action('increment', function() {
        this.count++;
      })
      .action('decrement', function() {
        this.count--;
      })
      .action('reset', function() {
        this.count = 0;
      })
      .build();
    
    console.log('Initial count:', actioned.count);
    
    setTimeout(() => {
      actioned.increment();
      console.log('After increment:', actioned.count);
      
      actioned.increment();
      actioned.increment();
      console.log('After 2 more increments:', actioned.count);
      
      actioned.decrement();
      console.log('After decrement:', actioned.count);
      
      actioned.reset();
      console.log('After reset:', actioned.count);
    }, 2000);
    
    // Build with actions (batch)
    console.log('\n=== Build with actions (batch) ===');
    const batchActions = ReactiveUtils.reactive({ count: 0 })
      .actions({
        add: function(n) { this.count += n; },
        subtract: function(n) { this.count -= n; },
        multiply: function(n) { this.count *= n; }
      })
      .build();
    
    setTimeout(() => {
      console.log('Initial:', batchActions.count);
      batchActions.add(10);
      console.log('After add(10):', batchActions.count);
      batchActions.multiply(2);
      console.log('After multiply(2):', batchActions.count);
      batchActions.subtract(5);
      console.log('After subtract(5):', batchActions.count);
    }, 2500);
    
    // Chaining all methods
    console.log('\n=== Chaining all methods ===');
    const fullBuilder = ReactiveUtils.reactive({
      value: 0
    })
      .computed({
        squared: function() { return this.value * this.value; }
      })
      .watch({
        value: (n, o) => console.log(`Value changed: ${o} → ${n}`)
      })
      .effect(function() {
        console.log(`Effect: value=${this.value}, squared=${this.squared}`);
      })
      .action('setValue', function(val) {
        this.value = val;
      })
      .build();
    
    setTimeout(() => {
      fullBuilder.setValue(3);
      console.log('After setValue(3), squared:', fullBuilder.squared);
    }, 3000);
    
    // Builder destroy
    console.log('\n=== Builder destroy ===');
    const destroyable = ReactiveUtils.reactive({ count: 0 })
      .effect(function() {
        console.log('Effect running, count:', this.count);
      })
      .build();
    
    setTimeout(() => {
      destroyable.count = 1;
      console.log('Before destroy, effect runs');
      
      destroyable.destroy();
      console.log('After destroy() called');
      
      destroyable.count = 2;
      console.log('After destroy, effect should not run');
    }, 3500);
    
    // Builder state access
    console.log('\n=== Builder state access ===');
    const stateAccess = ReactiveUtils.reactive({
      x: 10,
      y: 20
    });
    
    console.log('Before build, state:', stateAccess.state);
    console.log('Can access state.x:', stateAccess.state.x);
    console.log('Can access state.y:', stateAccess.state.y);
    
    const built = stateAccess.build();
    console.log('After build, can access directly:', {
      x: built.x,
      y: built.y
    });
    
    // Complex example
    console.log('\n=== Complex example ===');
    const todoApp = ReactiveUtils.reactive({
      todos: [],
      filter: 'all'
    })
      .computed({
        activeTodos: function() {
          return this.todos.filter(t => !t.done);
        },
        completedTodos: function() {
          return this.todos.filter(t => t.done);
        },
        filteredTodos: function() {
          if (this.filter === 'active') return this.activeTodos;
          if (this.filter === 'completed') return this.completedTodos;
          return this.todos;
        }
      })
      .actions({
        addTodo(text) {
          this.todos.push({ id: Date.now(), text, done: false });
        },
        toggleTodo(id) {
          const todo = this.todos.find(t => t.id === id);
          if (todo) todo.done = !todo.done;
        },
        setFilter(filter) {
          this.filter = filter;
        }
      })
      .build();
    
    setTimeout(() => {
      console.log('Todo app created');
      todoApp.addTodo('Task 1');
      todoApp.addTodo('Task 2');
      console.log('Todos:', todoApp.todos);
      console.log('Active:', todoApp.activeTodos);
      
      todoApp.toggleTodo(todoApp.todos[0].id);
      console.log('After toggle, completed:', todoApp.completedTodos);
    }, 4000);
    
    setTimeout(() => {
      console.log('\n=== Summary ===');
      console.log('✓ ReactiveUtils.reactive(state) creates builder');
      console.log('✓ Builder has state property with initial values');
      console.log('✓ Builder has computed() for computed properties');
      console.log('✓ Builder has watch() for watchers');
      console.log('✓ Builder has effect() for effects');
      console.log('✓ Builder has action() for single action');
      console.log('✓ Builder has actions() for multiple actions');
      console.log('✓ Builder has build() to create final state');
      console.log('✓ All builder methods are chainable');
      console.log('✓ Built state has destroy() method');
      console.log('✓ Perfect for complex reactive patterns');
    }, 4500);
  </script>
</body>
</html>
