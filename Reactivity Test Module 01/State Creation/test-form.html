<!DOCTYPE html>
<html>
<head><title>Test ReactiveUtils.form</title></head>
<body>
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script src="../../src/Reactive/04_dh-reactive-form.js"></script>

  <script>
    console.log('=== Testing ReactiveUtils.form() ===\n');

    // ========================================================================
    // TEST 1: Create basic form
    // ========================================================================
    console.log('TEST 1: Create basic form');
    const form1 = ReactiveUtils.form({
      username: '',
      email: '',
      password: ''
    });

    console.log('  Initial values:', form1.values);
    console.log('  Initial errors:', form1.errors);
    console.log('  Initial touched:', form1.touched);
    console.log('  Is reactive:', ReactiveUtils.isReactive(form1));
    console.log('  ✓ Basic form created\n');

    // ========================================================================
    // TEST 2: Form computed properties
    // ========================================================================
    console.log('TEST 2: Form computed properties');
    const form2 = ReactiveUtils.form({ name: '' });

    console.log('  isValid:', form2.isValid);
    console.log('  isDirty:', form2.isDirty);
    console.log('  hasErrors:', form2.hasErrors);
    console.log('  touchedFields:', form2.touchedFields);
    console.log('  errorFields:', form2.errorFields);
    console.log('  ✓ Computed properties available\n');

    // ========================================================================
    // TEST 3: setValue() method
    // ========================================================================
    console.log('TEST 3: setValue() method');
    const form3 = ReactiveUtils.form({ username: '', email: '' });

    form3.setValue('username', 'john_doe');
    console.log('  After setValue - username:', form3.values.username);
    console.log('  Username touched:', form3.touched.username);
    console.log('  Expected: true');

    form3.setValue('email', 'john@example.com');
    console.log('  After setValue - email:', form3.values.email);
    console.log('  isDirty:', form3.isDirty);
    console.log('  Expected: true');
    console.log('  ✓ setValue() works\n');

    // ========================================================================
    // TEST 4: setValues() method
    // ========================================================================
    console.log('TEST 4: setValues() method');
    const form4 = ReactiveUtils.form({ a: '', b: '', c: '' });

    form4.setValues({ a: '1', b: '2', c: '3' });
    console.log('  After setValues:', form4.values);
    console.log('  Expected: {a: "1", b: "2", c: "3"}');
    console.log('  touchedFields:', form4.touchedFields);
    console.log('  ✓ setValues() works\n');

    // ========================================================================
    // TEST 5: setError() and clearError()
    // ========================================================================
    console.log('TEST 5: setError() and clearError()');
    const form5 = ReactiveUtils.form({ email: '' });

    form5.setError('email', 'Invalid email');
    console.log('  After setError:', form5.errors.email);
    console.log('  hasErrors:', form5.hasErrors);
    console.log('  Expected: true');

    form5.clearError('email');
    console.log('  After clearError:', form5.errors.email);
    console.log('  hasErrors:', form5.hasErrors);
    console.log('  Expected: false');
    console.log('  ✓ Error methods work\n');

    // ========================================================================
    // TEST 6: Form with validators
    // ========================================================================
    console.log('TEST 6: Form with validators');
    const form6 = ReactiveUtils.form(
      { username: '', email: '' },
      {
        validators: {
          username: ReactiveUtils.validators.required('Username required'),
          email: ReactiveUtils.validators.email('Invalid email')
        }
      }
    );

    form6.setValue('username', '');
    console.log('  Empty username error:', form6.errors.username);
    console.log('  Expected: "Username required"');

    form6.setValue('username', 'john');
    console.log('  Valid username error:', form6.errors.username);
    console.log('  Expected: undefined');

    form6.setValue('email', 'not-an-email');
    console.log('  Invalid email error:', form6.errors.email);
    console.log('  Expected: "Invalid email"');

    form6.setValue('email', 'john@example.com');
    console.log('  Valid email error:', form6.errors.email);
    console.log('  Expected: undefined');
    console.log('  ✓ Validators work\n');

    // ========================================================================
    // TEST 7: validate() method
    // ========================================================================
    console.log('TEST 7: validate() method');
    const form7 = ReactiveUtils.form(
      { name: '', age: 0 },
      {
        validators: {
          name: ReactiveUtils.validators.required(),
          age: ReactiveUtils.validators.min(18, 'Must be 18+')
        }
      }
    );

    const isValid1 = form7.validate();
    console.log('  Empty form valid:', isValid1);
    console.log('  Expected: false');
    console.log('  Errors:', form7.errors);

    form7.values.name = 'John';
    form7.values.age = 25;
    const isValid2 = form7.validate();
    console.log('  Filled form valid:', isValid2);
    console.log('  Expected: true');
    console.log('  ✓ validate() works\n');

    // ========================================================================
    // TEST 8: reset() method
    // ========================================================================
    console.log('TEST 8: reset() method');
    const form8 = ReactiveUtils.form({ x: 'initial' });

    form8.setValue('x', 'updated');
    form8.setError('x', 'error');
    console.log('  Before reset:', {
      value: form8.values.x,
      error: form8.errors.x,
      dirty: form8.isDirty
    });

    form8.reset();
    console.log('  After reset:', {
      value: form8.values.x,
      error: form8.errors.x,
      dirty: form8.isDirty
    });
    console.log('  Expected: "initial", undefined, false');

    form8.setValue('x', 'new');
    form8.reset({ x: 'custom' });
    console.log('  After reset with custom:', form8.values.x);
    console.log('  Expected: "custom"');
    console.log('  ✓ reset() works\n');

    // ========================================================================
    // TEST 9: Form submission
    // ========================================================================
    console.log('TEST 9: Form submission');
    const form9 = ReactiveUtils.form(
      { username: '' },
      {
        validators: {
          username: ReactiveUtils.validators.required()
        },
        onSubmit: async (values, form) => {
          console.log('  Submit handler called with:', values);
          return { success: true };
        }
      }
    );

    // Try submitting invalid form
    form9.submit().then(result => {
      console.log('  Invalid submit result:', result);
      console.log('  Expected: {success: false, errors: {...}}');

      // Submit valid form
      form9.setValue('username', 'john');
      form9.submit().then(result2 => {
        console.log('  Valid submit result:', result2);
        console.log('  submitCount:', form9.submitCount);
        console.log('  ✓ submit() works\n');

        // ====================================================================
        // TEST 10: Helper methods
        // ====================================================================
        console.log('TEST 10: Helper methods');
        const form10 = ReactiveUtils.form({ email: '' });

        form10.setValue('email', 'test@test.com');
        form10.setError('email', 'Error message');

        console.log('  hasError("email"):', form10.hasError('email'));
        console.log('  Expected: true');

        console.log('  isTouched("email"):', form10.isTouched('email'));
        console.log('  Expected: true');

        console.log('  getError("email"):', form10.getError('email'));
        console.log('  Expected: "Error message"');

        console.log('  getValue("email"):', form10.getValue('email'));
        console.log('  Expected: "test@test.com"');

        console.log('  shouldShowError("email"):', form10.shouldShowError('email'));
        console.log('  Expected: true (touched + has error)');

        console.log('  ✓ Helper methods work\n');

        // ====================================================================
        // TEST 11: Practical use case - Registration form
        // ====================================================================
        console.log('TEST 11: Practical use case - Registration form');
        const registrationForm = ReactiveUtils.form(
          {
            username: '',
            email: '',
            password: '',
            confirmPassword: ''
          },
          {
            validators: {
              username: ReactiveUtils.validators.minLength(3),
              email: ReactiveUtils.validators.email(),
              password: ReactiveUtils.validators.minLength(8),
              confirmPassword: ReactiveUtils.validators.match('password', 'Passwords must match')
            }
          }
        );

        registrationForm.setValues({
          username: 'john_doe',
          email: 'john@example.com',
          password: 'password123',
          confirmPassword: 'password123'
        });

        const isValid = registrationForm.validate();
        console.log('  Registration form valid:', isValid);
        console.log('  Expected: true');
        console.log('  Form values:', registrationForm.values);

        console.log('  ✓ Registration form works\n');

        console.log('=== All ReactiveUtils.form() tests completed ===');
      });
    });
  </script>
</body>
</html>
