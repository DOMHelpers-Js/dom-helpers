<!DOCTYPE html>
<html>
<head><title>Test ReactiveUtils.ref()</title></head>
<body>
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script>
    console.log('=== Testing ReactiveUtils.ref() ===');
    
    // Basic ref creation
    console.log('\n=== Basic ref creation ===');
    const count = ReactiveUtils.ref(0);
    
    console.log('Created ref:', count);
    console.log('Type check:', typeof count === 'object');
    console.log('Has value property:', 'value' in count);
    console.log('Value:', count.value);
    
    // Ref with different types
    console.log('\n=== Ref with different types ===');
    const numberRef = ReactiveUtils.ref(42);
    const stringRef = ReactiveUtils.ref('hello');
    const booleanRef = ReactiveUtils.ref(true);
    const arrayRef = ReactiveUtils.ref([1, 2, 3]);
    const objectRef = ReactiveUtils.ref({ key: 'value' });
    const nullRef = ReactiveUtils.ref(null);
    const undefinedRef = ReactiveUtils.ref(undefined);
    
    console.log('Number ref:', numberRef.value);
    console.log('String ref:', stringRef.value);
    console.log('Boolean ref:', booleanRef.value);
    console.log('Array ref:', arrayRef.value);
    console.log('Object ref:', objectRef.value);
    console.log('Null ref:', nullRef.value);
    console.log('Undefined ref:', undefinedRef.value);
    
    // Updating ref value
    console.log('\n=== Updating ref value ===');
    const counter = ReactiveUtils.ref(0);
    
    console.log('Initial value:', counter.value);
    
    counter.value = 5;
    console.log('After counter.value = 5:', counter.value);
    
    counter.value++;
    console.log('After counter.value++:', counter.value);
    
    counter.value += 10;
    console.log('After counter.value += 10:', counter.value);
    
    // Ref is reactive
    console.log('\n=== Ref is reactive ===');
    const reactiveRef = ReactiveUtils.ref(10);
    
    let effectRuns = 0;
    ReactiveUtils.effect(() => {
      effectRuns++;
      console.log(`Effect #${effectRuns}: value = ${reactiveRef.value}`);
    });
    
    setTimeout(() => {
      reactiveRef.value = 20;
      console.log('Effect runs after value change:', effectRuns);
    }, 500);
    
    setTimeout(() => {
      reactiveRef.value = 30;
      console.log('Effect runs after second change:', effectRuns);
    }, 1000);
    
    // Ref with valueOf
    console.log('\n=== Ref with valueOf ===');
    const numRef = ReactiveUtils.ref(100);
    
    console.log('ref.value:', numRef.value);
    console.log('ref.valueOf():', numRef.valueOf());
    console.log('Same:', numRef.value === numRef.valueOf());
    
    const result = numRef.valueOf() + 50;
    console.log('valueOf() + 50:', result);
    
    // Ref with toString
    console.log('\n=== Ref with toString ===');
    const textRef = ReactiveUtils.ref('Hello');
    
    console.log('ref.value:', textRef.value);
    console.log('ref.toString():', textRef.toString());
    console.log('Same:', textRef.value === textRef.toString());
    
    const message = textRef.toString() + ' World';
    console.log('toString() + " World":', message);
    
    // Ref for toggle
    console.log('\n=== Ref for toggle ===');
    const isOpen = ReactiveUtils.ref(false);
    
    console.log('Initial:', isOpen.value);
    
    setTimeout(() => {
      isOpen.value = !isOpen.value;
      console.log('After toggle:', isOpen.value);
      
      isOpen.value = !isOpen.value;
      console.log('After toggle again:', isOpen.value);
    }, 1500);
    
    // Ref for counter pattern
    console.log('\n=== Ref for counter pattern ===');
    const clicks = ReactiveUtils.ref(0);
    
    const increment = () => clicks.value++;
    const decrement = () => clicks.value--;
    const reset = () => clicks.value = 0;
    
    console.log('Initial clicks:', clicks.value);
    
    setTimeout(() => {
      increment();
      console.log('After increment:', clicks.value);
      
      increment();
      increment();
      console.log('After 2 more increments:', clicks.value);
      
      decrement();
      console.log('After decrement:', clicks.value);
      
      reset();
      console.log('After reset:', clicks.value);
    }, 2000);
    
    // Ref with objects (reactive)
    console.log('\n=== Ref with objects (reactive) ===');
    const userRef = ReactiveUtils.ref({
      name: 'Alice',
      age: 25
    });
    
    console.log('Initial user:', userRef.value);
    
    setTimeout(() => {
      userRef.value.name = 'Bob';
      console.log('After changing name:', userRef.value);
      
      userRef.value.age = 30;
      console.log('After changing age:', userRef.value);
    }, 2500);
    
    // Ref with arrays (reactive)
    console.log('\n=== Ref with arrays (reactive) ===');
    const itemsRef = ReactiveUtils.ref([1, 2, 3]);
    
    let arrayEffectRuns = 0;
    ReactiveUtils.effect(() => {
      arrayEffectRuns++;
      console.log(`Array effect #${arrayEffectRuns}: length = ${itemsRef.value.length}`);
    });
    
    setTimeout(() => {
      itemsRef.value.push(4);
      console.log('After push, effect runs:', arrayEffectRuns);
    }, 3000);
    
    setTimeout(() => {
      itemsRef.value = [1, 2, 3, 4, 5];
      console.log('After reassignment, effect runs:', arrayEffectRuns);
    }, 3500);
    
    // Ref with computed
    console.log('\n=== Ref with computed ===');
    const base = ReactiveUtils.ref(5);
    
    base.$computed('doubled', function() {
      return this.value * 2;
    });
    
    console.log('base.value:', base.value);
    console.log('base.doubled (computed):', base.doubled);
    
    setTimeout(() => {
      base.value = 10;
      console.log('After base.value = 10:');
      console.log('  value:', base.value);
      console.log('  doubled:', base.doubled);
    }, 4000);
    
    // Ref for input tracking
    console.log('\n=== Ref for input tracking ===');
    const inputValue = ReactiveUtils.ref('');
    
    ReactiveUtils.effect(() => {
      if (inputValue.value) {
        console.log(`Input changed: "${inputValue.value}"`);
      }
    });
    
    setTimeout(() => {
      inputValue.value = 'Hello';
    }, 4500);
    
    setTimeout(() => {
      inputValue.value = 'Hello World';
    }, 5000);
    
    // Ref comparison
    console.log('\n=== Ref comparison ===');
    const ref1 = ReactiveUtils.ref(5);
    const ref2 = ReactiveUtils.ref(5);
    
    console.log('ref1.value === ref2.value:', ref1.value === ref2.value);
    console.log('ref1 === ref2:', ref1 === ref2);
    console.log('Different ref objects, same values');
    
    setTimeout(() => {
      console.log('\n=== Summary ===');
      console.log('✓ ReactiveUtils.ref(value) creates reactive reference');
      console.log('✓ Access value via .value property');
      console.log('✓ Works with all data types');
      console.log('✓ Updating .value triggers reactivity');
      console.log('✓ Has valueOf() method for primitive conversion');
      console.log('✓ Has toString() method for string conversion');
      console.log('✓ Perfect for single values (counters, toggles)');
      console.log('✓ Can contain objects and arrays (also reactive)');
      console.log('✓ Supports $computed for derived values');
      console.log('✓ Each ref is independent object');
    }, 5500);
  </script>
</body>
</html>
