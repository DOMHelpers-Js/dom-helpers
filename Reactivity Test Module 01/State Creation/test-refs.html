<!DOCTYPE html>
<html>
<head><title>Test ReactiveUtils.refs()</title></head>
<body>
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script>
    console.log('=== Testing ReactiveUtils.refs() ===');
    
    // Basic refs creation
    console.log('\n=== Basic refs creation ===');
    const refs = ReactiveUtils.refs({
      count: 0,
      name: 'Test',
      active: false
    });
    
    console.log('Created refs:', refs);
    console.log('Type check:', typeof refs === 'object');
    console.log('Has count ref:', 'count' in refs);
    console.log('Has name ref:', 'name' in refs);
    console.log('Has active ref:', 'active' in refs);
    
    // Each is a ref
    console.log('\n=== Each is a ref ===');
    console.log('count is object:', typeof refs.count === 'object');
    console.log('count.value:', refs.count.value);
    console.log('name.value:', refs.name.value);
    console.log('active.value:', refs.active.value);
    
    // Updating refs
    console.log('\n=== Updating refs ===');
    const data = ReactiveUtils.refs({
      x: 0,
      y: 0
    });
    
    console.log('Initial:', {
      x: data.x.value,
      y: data.y.value
    });
    
    data.x.value = 10;
    data.y.value = 20;
    console.log('After update:', {
      x: data.x.value,
      y: data.y.value
    });
    
    // Refs with different types
    console.log('\n=== Refs with different types ===');
    const typed = ReactiveUtils.refs({
      number: 42,
      string: 'hello',
      boolean: true,
      array: [1, 2, 3],
      object: { key: 'value' },
      nullValue: null
    });
    
    console.log('number.value:', typed.number.value);
    console.log('string.value:', typed.string.value);
    console.log('boolean.value:', typed.boolean.value);
    console.log('array.value:', typed.array.value);
    console.log('object.value:', typed.object.value);
    console.log('nullValue.value:', typed.nullValue.value);
    
    // Each ref is reactive independently
    console.log('\n=== Each ref is reactive independently ===');
    const counters = ReactiveUtils.refs({
      a: 0,
      b: 0,
      c: 0
    });
    
    let effectARuns = 0;
    let effectBRuns = 0;
    
    ReactiveUtils.effect(() => {
      effectARuns++;
      console.log(`Effect A #${effectARuns}: a = ${counters.a.value}`);
    });
    
    ReactiveUtils.effect(() => {
      effectBRuns++;
      console.log(`Effect B #${effectBRuns}: b = ${counters.b.value}`);
    });
    
    setTimeout(() => {
      counters.a.value = 1;
      console.log('After a change, effectA runs:', effectARuns);
      console.log('After a change, effectB runs:', effectBRuns);
    }, 500);
    
    setTimeout(() => {
      counters.b.value = 1;
      console.log('After b change, effectA runs:', effectARuns);
      console.log('After b change, effectB runs:', effectBRuns);
    }, 1000);
    
    // Destructuring refs
    console.log('\n=== Destructuring refs ===');
    const { count, message, isActive } = ReactiveUtils.refs({
      count: 0,
      message: 'Hello',
      isActive: false
    });
    
    console.log('Destructured refs:');
    console.log('  count.value:', count.value);
    console.log('  message.value:', message.value);
    console.log('  isActive.value:', isActive.value);
    
    setTimeout(() => {
      count.value = 10;
      message.value = 'Updated';
      isActive.value = true;
      
      console.log('After updates:');
      console.log('  count.value:', count.value);
      console.log('  message.value:', message.value);
      console.log('  isActive.value:', isActive.value);
    }, 1500);
    
    // Form-like pattern
    console.log('\n=== Form-like pattern ===');
    const form = ReactiveUtils.refs({
      username: '',
      email: '',
      password: ''
    });
    
    console.log('Initial form:', {
      username: form.username.value,
      email: form.email.value,
      password: form.password.value
    });
    
    setTimeout(() => {
      form.username.value = 'johndoe';
      form.email.value = 'john@example.com';
      form.password.value = 'secret123';
      
      console.log('Filled form:', {
        username: form.username.value,
        email: form.email.value,
        password: form.password.value
      });
    }, 2000);
    
    // Refs with valueOf and toString
    console.log('\n=== Refs with valueOf and toString ===');
    const values = ReactiveUtils.refs({
      num: 100,
      text: 'Test'
    });
    
    console.log('num.valueOf():', values.num.valueOf());
    console.log('text.toString():', values.text.toString());
    console.log('Can use in expressions:', values.num.valueOf() + 50);
    console.log('Can concatenate:', values.text.toString() + ' Message');
    
    // Refs for toggle states
    console.log('\n=== Refs for toggle states ===');
    const toggles = ReactiveUtils.refs({
      menu: false,
      sidebar: false,
      modal: false
    });
    
    console.log('Initial toggles:', {
      menu: toggles.menu.value,
      sidebar: toggles.sidebar.value,
      modal: toggles.modal.value
    });
    
    setTimeout(() => {
      toggles.menu.value = !toggles.menu.value;
      console.log('After menu toggle:', toggles.menu.value);
      
      toggles.modal.value = !toggles.modal.value;
      console.log('After modal toggle:', toggles.modal.value);
    }, 2500);
    
    // Refs with computed
    console.log('\n=== Refs with computed ===');
    const dimensions = ReactiveUtils.refs({
      width: 10,
      height: 20
    });
    
    dimensions.width.$computed('doubled', function() {
      return this.value * 2;
    });
    
    dimensions.height.$computed('tripled', function() {
      return this.value * 3;
    });
    
    console.log('width:', dimensions.width.value);
    console.log('width.doubled:', dimensions.width.doubled);
    console.log('height:', dimensions.height.value);
    console.log('height.tripled:', dimensions.height.tripled);
    
    setTimeout(() => {
      dimensions.width.value = 15;
      dimensions.height.value = 25;
      
      console.log('After updates:');
      console.log('  width.doubled:', dimensions.width.doubled);
      console.log('  height.tripled:', dimensions.height.tripled);
    }, 3000);
    
    // Empty refs object
    console.log('\n=== Empty refs object ===');
    const empty = ReactiveUtils.refs({});
    console.log('Empty refs:', empty);
    console.log('Keys:', Object.keys(empty));
    console.log('Length:', Object.keys(empty).length);
    
    // Large number of refs
    console.log('\n=== Large number of refs ===');
    const many = ReactiveUtils.refs({
      field1: '',
      field2: '',
      field3: '',
      field4: '',
      field5: '',
      field6: '',
      field7: '',
      field8: '',
      field9: '',
      field10: ''
    });
    
    console.log('Created 10 refs:', Object.keys(many).length);
    console.log('All are ref objects:', 
      Object.values(many).every(r => typeof r === 'object' && 'value' in r)
    );
    
    // Refs vs individual ref calls
    console.log('\n=== Refs vs individual ref calls ===');
    const individual1 = ReactiveUtils.ref(0);
    const individual2 = ReactiveUtils.ref('');
    const individual3 = ReactiveUtils.ref(false);
    
    const batch = ReactiveUtils.refs({
      val1: 0,
      val2: '',
      val3: false
    });
    
    console.log('Individual refs work the same as batch refs');
    console.log('individual1.value:', individual1.value);
    console.log('batch.val1.value:', batch.val1.value);
    console.log('Same behavior:', individual1.value === batch.val1.value);
    
    setTimeout(() => {
      console.log('\n=== Summary ===');
      console.log('✓ ReactiveUtils.refs(defs) creates multiple refs');
      console.log('✓ Returns object with property for each ref');
      console.log('✓ Each property is a ref object with .value');
      console.log('✓ All data types supported');
      console.log('✓ Each ref is independently reactive');
      console.log('✓ Can destructure for convenience');
      console.log('✓ Perfect for form fields or related state');
      console.log('✓ Each ref has valueOf() and toString()');
      console.log('✓ Each ref supports $computed');
      console.log('✓ More convenient than multiple ref() calls');
    }, 3500);
  </script>
</body>
</html>
