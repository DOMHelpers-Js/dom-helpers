<!DOCTYPE html>
<html>
<head><title>Test ReactiveUtils.collection()</title></head>
<body>
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script src="../../src/Reactive/03_dh-reactive-collections.js"></script>
  <script>
    console.log('=== Testing ReactiveUtils.collection() ===');
    
    // Basic collection creation
    console.log('\n=== Basic collection creation ===');
    const collection = ReactiveUtils.collection([1, 2, 3]);
    
    console.log('Created collection:', collection);
    console.log('Type check:', typeof collection === 'object');
    console.log('Has items:', collection.items);
    console.log('Items:', collection.items);
    
    // Empty collection
    console.log('\n=== Empty collection ===');
    const emptyCollection = ReactiveUtils.collection();
    console.log('Empty collection items:', emptyCollection.items);
    console.log('Length:', emptyCollection.length);
    console.log('Is empty:', emptyCollection.isEmpty());
    
    // Collection with objects
    console.log('\n=== Collection with objects ===');
    const todos = ReactiveUtils.collection([
      { id: 1, text: 'Task 1', done: false },
      { id: 2, text: 'Task 2', done: true },
      { id: 3, text: 'Task 3', done: false }
    ]);
    
    console.log('Todos collection:', todos.items);
    console.log('Length:', todos.length);
    console.log('First todo:', todos.first);
    console.log('Last todo:', todos.last);
    
    // Collection methods available
    console.log('\n=== Collection methods available ===');
    const methods = ReactiveUtils.collection([]);
    console.log('Has add:', typeof methods.add === 'function');
    console.log('Has remove:', typeof methods.remove === 'function');
    console.log('Has update:', typeof methods.update === 'function');
    console.log('Has clear:', typeof methods.clear === 'function');
    console.log('Has find:', typeof methods.find === 'function');
    console.log('Has filter:', typeof methods.filter === 'function');
    console.log('Has map:', typeof methods.map === 'function');
    console.log('Has forEach:', typeof methods.forEach === 'function');
    console.log('Has sort:', typeof methods.sort === 'function');
    console.log('Has push:', typeof methods.push === 'function');
    console.log('Has toggle:', typeof methods.toggle === 'function');
    console.log('Has reset:', typeof methods.reset === 'function');
    
    // Using collection methods
    console.log('\n=== Using collection methods ===');
    const numbers = ReactiveUtils.collection([1, 2, 3]);
    
    numbers.add(4);
    console.log('After add(4):', numbers.items);
    
    numbers.push(5, 6);
    console.log('After push(5, 6):', numbers.items);
    
    numbers.remove(3);
    console.log('After remove(3):', numbers.items);
    
    // Collection is reactive
    console.log('\n=== Collection is reactive ===');
    const reactiveCollection = ReactiveUtils.collection([10, 20]);
    
    let effectRuns = 0;
    ReactiveUtils.effect(() => {
      effectRuns++;
      console.log(`Effect #${effectRuns}: length = ${reactiveCollection.length}`);
    });
    
    setTimeout(() => {
      reactiveCollection.add(30);
      console.log('Effect runs after add:', effectRuns);
    }, 500);
    
    setTimeout(() => {
      reactiveCollection.clear();
      console.log('Effect runs after clear:', effectRuns);
    }, 1000);
    
    // Collection with computed
    console.log('\n=== Collection with computed ===');
    const itemsCollection = ReactiveUtils.collection([
      { price: 10 },
      { price: 20 },
      { price: 30 }
    ]);
    
    itemsCollection.$computed('total', function() {
      return this.items.reduce((sum, item) => sum + item.price, 0);
    });
    
    console.log('Items:', itemsCollection.items);
    console.log('Total (computed):', itemsCollection.total);
    
    setTimeout(() => {
      itemsCollection.add({ price: 40 });
      console.log('After add, total:', itemsCollection.total);
    }, 1500);
    
    // Collection with different types
    console.log('\n=== Collection with different types ===');
    const stringCollection = ReactiveUtils.collection(['a', 'b', 'c']);
    const objectCollection = ReactiveUtils.collection([
      { name: 'Alice' },
      { name: 'Bob' }
    ]);
    const mixedCollection = ReactiveUtils.collection([1, 'two', { three: 3 }]);
    
    console.log('String collection:', stringCollection.items);
    console.log('Object collection:', objectCollection.items);
    console.log('Mixed collection:', mixedCollection.items);
    
    // Collection chaining
    console.log('\n=== Collection chaining ===');
    const chainCollection = ReactiveUtils.collection([]);
    
    chainCollection
      .add(1)
      .add(2)
      .add(3)
      .sort((a, b) => b - a)
      .push(0);
    
    console.log('After chaining:', chainCollection.items);
    
    // Collection transformation
    console.log('\n=== Collection transformation ===');
    const dataCollection = ReactiveUtils.collection([1, 2, 3, 4, 5]);
    
    const doubled = dataCollection.map(n => n * 2);
    console.log('Mapped (doubled):', doubled);
    
    const evens = dataCollection.filter(n => n % 2 === 0);
    console.log('Filtered (evens):', evens);
    
    const found = dataCollection.find(n => n > 3);
    console.log('Found (> 3):', found);
    
    // Collection properties
    console.log('\n=== Collection properties ===');
    const propsCollection = ReactiveUtils.collection(['a', 'b', 'c', 'd', 'e']);
    
    console.log('length:', propsCollection.length);
    console.log('first:', propsCollection.first);
    console.log('last:', propsCollection.last);
    console.log('at(2):', propsCollection.at(2));
    console.log('isEmpty():', propsCollection.isEmpty());
    
    // Collection vs list alias
    console.log('\n=== Collection vs list alias ===');
    const coll = ReactiveUtils.collection([1, 2, 3]);
    const list = ReactiveUtils.list([1, 2, 3]);
    
    console.log('collection items:', coll.items);
    console.log('list items:', list.items);
    console.log('Same structure:', 
      JSON.stringify(coll.items) === JSON.stringify(list.items)
    );
    
    setTimeout(() => {
      console.log('\n=== Summary ===');
      console.log('✓ ReactiveUtils.collection(items) creates reactive collection');
      console.log('✓ Can create empty collection with no arguments');
      console.log('✓ Works with arrays of any type (numbers, strings, objects)');
      console.log('✓ Has all collection methods (add, remove, find, etc.)');
      console.log('✓ Collection is reactive (triggers effects)');
      console.log('✓ Supports computed properties via $computed');
      console.log('✓ Methods are chainable');
      console.log('✓ Supports transformation methods (map, filter, find)');
      console.log('✓ Has convenience properties (length, first, last)');
      console.log('✓ ReactiveUtils.list is alias for collection');
    }, 2000);
  </script>
</body>
</html>
