<!DOCTYPE html>
<html>
<head><title>Test ReactiveUtils.list()</title></head>
<body>
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script>
    console.log('=== Creating lists ===');
    
    // Create empty list
    const list1 = ReactiveUtils.list();
    console.log('Empty list:', list1.items);
    
    // Create list with items
    const list2 = ReactiveUtils.list([1, 2, 3, 4, 5]);
    console.log('\nList with items:', list2.items);
    
    // Test list methods
    console.log('\n=== Testing list methods ===');
    
    list2.$add(6);
    console.log('After $add(6):', list2.items);
    
    list2.$remove(3);
    console.log('After $remove(3):', list2.items);
    
    list2.$update(item => item === 2, { value: 20 });
    console.log('After $update:', list2.items);
    
    // Create list with objects
    console.log('\n=== List with objects ===');
    const todos = ReactiveUtils.list([
      { id: 1, text: 'Learn React', done: false },
      { id: 2, text: 'Build app', done: false },
      { id: 3, text: 'Deploy', done: false }
    ]);
    
    console.log('Initial todos:', todos.items);
    
    // Add todo
    todos.$add({ id: 4, text: 'Celebrate', done: false });
    console.log('\nAfter add:', todos.items);
    
    // Update todo
    todos.$update(t => t.id === 2, { done: true });
    console.log('\nAfter marking #2 done:', todos.items);
    
    // Remove todo
    todos.$remove(t => t.id === 1);
    console.log('\nAfter removing #1:', todos.items);
    
    // Clear all
    todos.$clear();
    console.log('\nAfter clear:', todos.items);
    
    // List is reactive
    console.log('\n=== Testing reactivity ===');
    let effectRuns = 0;
    ReactiveUtils.effect(() => {
      effectRuns++;
      console.log(`Effect #${effectRuns}: list has ${list2.items.length} items`);
    });
    
    setTimeout(() => {
      list2.$add(100);
      console.log('Effect runs:', effectRuns);
    }, 1000);
  </script>
</body>
</html>
