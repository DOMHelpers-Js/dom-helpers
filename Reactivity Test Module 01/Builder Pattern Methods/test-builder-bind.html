<!DOCTYPE html>
<html>
<head><title>Debug builder.bind()</title></head>
<body>
  <div id="counter">INITIAL</div>
  
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      console.log('=== DEBUGGING BINDINGS ===');
      
      // First, test if element exists
      const el = document.getElementById('counter');
      console.log('Element found:', el);
      console.log('Element content:', el.textContent);
      
      // Create simple state with binding
      const state = ReactiveUtils.state({ count: 0 });
      
      console.log('\n=== Creating binding ===');
      const cleanup = state.$bind({
        '#counter': 'count'
      });
      
      console.log('Binding created, cleanup:', typeof cleanup);
      console.log('Element should now show: 0');
      console.log('Element actually shows:', el.textContent);
      
      // Update state
      setTimeout(() => {
        console.log('\n=== Updating count to 5 ===');
        state.count = 5;
        console.log('State.count:', state.count);
        console.log('Element should show: 5');
        console.log('Element actually shows:', el.textContent);
      }, 1000);
      
      setTimeout(() => {
        console.log('\n=== Updating count to 10 ===');
        state.count = 10;
        console.log('State.count:', state.count);
        console.log('Element should show: 10');
        console.log('Element actually shows:', el.textContent);
      }, 2000);
    });
  </script>
</body>
</html>
