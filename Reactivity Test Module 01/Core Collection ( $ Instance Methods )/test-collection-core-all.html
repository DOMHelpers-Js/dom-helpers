<!DOCTYPE html>
<html>
<head><title>Test All Core Collection Methods</title></head>
<body>
  <script src="../../src/Reactive/01_dh-reactive.js"></script>
  <script>
    console.log('=== Testing All Core Collection Methods ===');
    
    // Test all methods together
    console.log('\n=== Integration test ===');
    const collection = ReactiveUtils.collection([]);
    
    // Test items
    console.log('Initial items:', collection.items);
    console.log('Is array:', Array.isArray(collection.items));
    
    // Test $add
    collection.$add({ id: 1, name: 'John', active: true });
    collection.$add({ id: 2, name: 'Jane', active: false });
    collection.$add({ id: 3, name: 'Bob', active: true });
    console.log('After adds:', collection.items);
    
    // Test $update
    collection.$update(item => item.id === 2, { active: true });
    console.log('After update:', collection.items);
    console.log('Jane is active:', collection.items[1].active === true);
    
    // Test $remove
    collection.$remove(item => item.id === 3);
    console.log('After remove:', collection.items);
    console.log('Count:', collection.items.length);
    
    // Test $clear
    collection.$clear();
    console.log('After clear:', collection.items);
    console.log('Empty:', collection.items.length === 0);
    
    console.log('✓ All methods work together');
    
    // Real-world todo list example
    console.log('\n=== Real-world todo list example ===');
    setTimeout(() => {
      const todos = ReactiveUtils.collection([]);
      
      // Add todos
      todos.$add({ id: 1, text: 'Buy groceries', done: false });
      todos.$add({ id: 2, text: 'Walk dog', done: false });
      todos.$add({ id: 3, text: 'Write code', done: false });
      
      console.log('Initial todos:', todos.items);
      
      // Complete a todo
      todos.$update(item => item.id === 2, { done: true });
      console.log('After completing todo:', todos.items);
      
      // Remove completed
      todos.$remove(item => item.done);
      console.log('After removing completed:', todos.items);
      
      // Clear all
      todos.$clear();
      console.log('After clearing all:', todos.items);
      
      console.log('✓ Todo list workflow works perfectly');
    }, 500);
    
    // Test with reactivity
    console.log('\n=== Test all methods with reactivity ===');
    setTimeout(() => {
      const reactiveCol = ReactiveUtils.collection([]);
      
      let effectCount = 0;
      ReactiveUtils.effect(() => {
        effectCount++;
        const length = reactiveCol.items.length;
      });
      
      const initialCount = effectCount;
      
      reactiveCol.$add(1);
      reactiveCol.$add(2);
      
      setTimeout(() => {
        const afterAdds = effectCount;
        
        reactiveCol.$update(1, { value: 10 });
        
        setTimeout(() => {
          const afterUpdate = effectCount;
          
          reactiveCol.$remove(1);
          
          setTimeout(() => {
            const afterRemove = effectCount;
            
            reactiveCol.$clear();
            
            setTimeout(() => {
              console.log('Effect runs - adds:', afterAdds - initialCount);
              console.log('Effect runs - update:', afterUpdate - afterAdds);
              console.log('Effect runs - remove:', afterRemove - afterUpdate);
              console.log('Effect runs - clear:', effectCount - afterRemove);
              console.log('✓ All methods trigger reactivity');
            }, 50);
          }, 50);
        }, 50);
      }, 50);
    }, 1000);
    
    setTimeout(() => {
      console.log('\n=== Summary ===');
      console.log('✓ collection.items - Reactive array property');
      console.log('✓ collection.$add(item) - Add items');
      console.log('✓ collection.$remove(predicate) - Remove items');
      console.log('✓ collection.$update(predicate, updates) - Update items');
      console.log('✓ collection.$clear() - Clear all items');
      console.log('✓ All methods work together seamlessly');
      console.log('✓ All methods are reactive');
      console.log('✓ Perfect for real-world data management');
    }, 2000);
  </script>
</body>
</html>
